<!DOCTYPE html>
<html lang="th">
<head>

    <style>
        /* ระบบจัดการสีแบบ Dynamic Contrast */
        :root {
            --p-color: #22c55e;
            --p-bg: #f8fafc;
            --p-text: #1e293b;
            --p-card: #ffffff;
        }

        /* ธีมน้ำเงิน (แก้ฟอนต์ให้อ่านง่าย 100%) */
        body.theme-blue {
            --p-color: #3b82f6;
            --p-bg: #0f172a;
            --p-text: #f8fafc; /* ตัวหนังสือขาวสว่าง */
            --p-card: #1e293b;
        }

        /* ธีมมืด */
        body.theme-dark {
            --p-color: #10b981;
            --p-bg: #020617;
            --p-text: #f1f5f9;
            --p-card: #0f172a;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--p-bg); 
            color: var(--p-text);
            transition: 0.4s ease; 
        }

        .app-card { background-color: var(--p-card); border-radius: 2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .btn-main { 
            background-color: var(--p-color); 
            color: white; 
            border-radius: 1.25rem;
            font-weight: 700;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(110%); }

        /* Mobile Tab Scroll (ไม่เบียด) */
        .tab-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 5px;
            scrollbar-width: none;
        }
        .tab-scroller::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            flex: 0 0 auto;
            padding: 12px 24px;
            border-radius: 1.25rem;
            font-weight: 700;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: var(--p-color);
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .input-style {
            background-color: rgba(148, 163, 184, 0.05);
            border: 2px solid transparent;
            border-radius: 1.25rem;
            padding: 14px;
            width: 100%;
            outline: none;
            color: var(--p-text);
            transition: 0.3s;
        }
        .input-style:focus { border-color: var(--p-color); background-color: var(--p-card); }
        
        /* แก้ปัญหาสีข้อความในธีมน้ำเงิน */
        body.theme-blue h2, body.theme-blue p, body.theme-blue span { color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] bg-white/80 backdrop-blur-xl border-b border-gray-100 px-4 py-4 md:px-8 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">

                    <i class="fa-solid fa-graduation-cap text-xl"></i>

    <main class="max-w-6xl mx-auto px-4 md:px-6 mt-8">

        <div id="view-chat" class="hidden app-card p-4 md:p-6 animate__animated animate__fadeIn flex flex-col h-[65vh] md:h-[75vh]">

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authTitle" class="text-3xl font-black italic text-center mb-10 tracking-tighter uppercase">QuizMaster</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="authWithSocial('google')" class="bg-white border py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-gray-50 shadow-sm dark:bg-gray-700 dark:border-gray-600">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Google
                    </button>
                    <button onclick="authWithSocial('facebook')" class="bg-[#1877F2] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
                        <i class="fa-brands fa-facebook text-xl"></i> Facebook
                    </button>
                </div>
                <div class="flex items-center gap-2 py-4">
                    <hr class="flex-1 border-gray-100"> <span class="text-[10px] text-gray-300 font-bold">OR EMAIL</span> <hr class="flex-1 border-gray-100">

                <input type="email" id="emailInp" placeholder="Email" class="input-style font-bold dark:bg-gray-700">
                <input type="password" id="passInp" placeholder="Password" class="input-style font-bold dark:bg-gray-700">
                
                <div id="loginGroup">
                    <button onclick="handleEmailAuth('login')" class="btn-main w-full py-5 text-lg shadow-xl mb-4">LOG IN</button>

                <div id="signGroup" class="hidden">
                    <button onclick="handleEmailAuth('sign')" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl mb-4">SIGN UP</button>
                    <p class="text-center text-xs text-gray-400 font-bold uppercase">Have account? <a href="javascript:switchAuth('login')" class="text-green-500 underline">Log In</a></p>
                </div>
            </div>
            <button onclick="closeAuthModal()" class="w-full mt-10 text-gray-300 text-[10px] font-black uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. INITIALIZATION & FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c",
            measurementId: "G-GDYRJDMZCV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const ADMIN_MARK_EMAIL = "Kritsanapong0710@gmail.com";
        const DEF_GEMINI_KEY = "AIzaSyCu8V3wiyBXqMPKew8B97tP0cD7D2ra1uw"; // ค่าพื้นฐาน (เผื่อลืม)

        let currentUser = null;
        let isMarkAdmin = false;

        // ==========================================
        // 2. AUTHENTICATION LOGIC (FIXED POSITION)
        // ==========================================
        auth.onAuthStateChanged(function(user) {
            currentUser = user;
            const topArea = document.getElementById('navAuthArea');
            if (user) {
                // บังคับ Case-Insensitive Check สำหรับอีเมล Mark
                isMarkAdmin = (user.email && user.email.toLowerCase() === ADMIN_MARK_EMAIL.toLowerCase()) || (user.phoneNumber === '+66967358298');
                
                const profilePic = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'Mark'}&background=22c55e&color=fff`;
                topArea.innerHTML = `
                    <div class="flex items-center gap-3 bg-white p-1 pr-4 rounded-full border border-gray-100 shadow-sm animate__animated animate__fadeInRight dark:bg-gray-800">
                        <img src="${profilePic}" class="w-10 h-10 rounded-full border-2 border-primary shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black max-w-[80px] truncate leading-tight dark:text-white">${user.displayName || 'User'}</span>
                            <span class="text-[8px] font-bold text-green-500 uppercase tracking-tighter">${isMarkAdmin ? '👑 Admin' : 'Member'}</span>
                        </div>
                        <button onclick="auth.signOut()" class="text-red-300 hover:text-red-500 ml-2 transition-colors"><i class="fa-solid fa-power-off text-xs"></i></button>
                    </div>
                `;
                if(isMarkAdmin) document.getElementById('adminSecretArea').classList.remove('hidden');
                closeAuthModal();
                fetchExams();
            } else {
                topArea.innerHTML = `<button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl font-black text-xs hover:bg-green-500 hover:text-white transition-all shadow-sm">LOGIN</button>`;
                document.getElementById('adminSecretArea').classList.add('hidden');
                isMarkAdmin = false;
                fetchExams();
            }
        });

        function openAuthModal(m) { document.getElementById('authModal').classList.remove('hidden'); switchAuth(m); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuth(m) {
            const isSign = m === 'sign';
            document.getElementById('loginGroup').classList.toggle('hidden', isSign);
            document.getElementById('signGroup').classList.toggle('hidden', !isSign);
            document.getElementById('authTitle').innerText = isSign ? "SIGN UP" : "WELCOME";
        }

        async function authWithSocial(pName) {
            const provider = (pName === 'google') ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try { await auth.signInWithPopup(provider); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function handleEmailAuth(mode) {
            const email = document.getElementById('emailInp').value;
            const pass = document.getElementById('passInp').value;
            if(!email || !pass) return alert("กรอกข้อมูลให้ครบครับ");
            try {
                if(mode === 'sign') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await res.user.sendEmailVerification();
                    alert("สมัครสมาชิกแล้ว! กรุณายืนยันตัวตนในอีเมลนะครับ");
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch (x) { alert(x.message); }
        }

        // ==========================================
        // 3. AI SYSTEM (ANTI-BUG RELIABLE VERSION)
        // ==========================================
        function getMyApiKey() { return localStorage.getItem('mk_official_key') || ""; }

        async function callGemini(prompt) {
            const key = getMyApiKey();
            if(!key) throw new Error("Mark ครับ! คุณยังไม่ได้เอา API Key มาแปะในหน้า Settings Admin ครับ!");
            
            const persona = localStorage.getItem('mk_official_persona') || "คุณเป็นครูติวเตอร์อัจฉริยะ";
            const reqBody = { contents: [{ parts: [{ text: `[System Info: ${persona}]\n\n${prompt}` }] }] };

            // 🛑 FIXED: ลองยิงไปที่ v1/models/gemini-1.5-flash (ตัว Stable ที่สุดตอนนี้) 🛑
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqBody)
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    throw new Error(data.error.message);
                }
            } catch (e) {
                // FALLBACK: ถ้า v1 พัง ให้ลอง v1beta ทันที
                const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                const fallbackResponse = await fetch(fallbackUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqBody)
                });
                const fallbackData = await fallbackResponse.json();
                if (fallbackData.candidates) return fallbackData.candidates[0].content.parts[0].text;
                throw new Error("AI ล้มเหลวทุกช่องทาง: " + e.message);
            }
        }

        async function generateExamWithAI() {
            const topic = document.getElementById('aiTopicInp').value;
            if(!topic) return alert("ใส่หัวข้อก่อนครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังวิเคราะห์...`;
            btn.disabled = true;

            try {
                const prompt = `ออกข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`;
                const res = await callGemini(prompt);
                document.getElementById('bulkInput').value = res;
                document.getElementById('finalTitle').value = topic;
                switchPage('import');
                parseRawText();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-wand-sparkles"></i> เริ่มออกข้อสอบ`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const inp = document.getElementById('chatInputArea');
            const box = document.getElementById('chatMessages');
            const msg = inp.value.trim();
            if(!msg) return;
            inp.value = '';

            box.innerHTML += `<div class="flex justify-end animate__animated animate__fadeInRight"><div class="bg-green-500 text-white p-4 rounded-[1.5rem] rounded-tr-none max-w-[85%] text-sm font-bold shadow-md">${msg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const lid = "loading-" + Date.now();
            box.innerHTML += `<div id="${lid}" class="text-[10px] font-black opacity-30 animate-pulse uppercase ml-2 italic">AI thinking...</div>`;

            try {
                const aiRes = await callGemini(msg);
                document.getElementById(lid).remove();
                
                const aiName = localStorage.getItem('mk_official_name') || "AI Tutor";
                const aiImg = localStorage.getItem('mk_official_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";

                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${aiImg}" class="w-9 h-9 rounded-2xl border-2 border-green-500 shadow-sm object-cover">
                        <div class="bg-white text-gray-700 p-4 rounded-[1.5rem] rounded-tl-none max-w-[85%] text-sm shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                            <p class="text-[9px] font-black text-blue-500 mb-1 uppercase">${aiName}</p>
                            ${aiRes.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lid).innerText = "❌ เกิดข้อผิดพลาด: " + e.message; }
        }

        // ==========================================
        // 4. DATABASE & PARSER LOGIC
        // ==========================================
        function parseRawText() {
            const raw = document.getElementById('bulkInput').value;
            const container = document.getElementById('editorContent');
            container.innerHTML = '';
            
            const blocks = raw.split('question*(').filter(function(q) { return q.trim() !== ''; });
            blocks.forEach(function(b, i) {
                const parts = b.split(')');
                if(parts.length < 2) return;
                const qText = parts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                
                while((m = re.exec(parts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border rounded-2xl hover:border-green-300 dark:bg-gray-700 transition-all">
                            <input type="radio" name="grp_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500 cursor-pointer">
                            <span class="font-black text-gray-400 uppercase w-6 text-center">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="val-opt flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="q-item app-card p-6 md:p-10 relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-6 right-6 text-gray-200 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-xl"></i></button>
                        <div class="mb-6"><span class="bg-gray-900 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase shadow-lg">ข้อที่ ${i+1}</span></div>
                        <textarea class="val-q w-full bg-transparent font-black text-xl md:text-2xl border-b-2 border-gray-100 pb-4 outline-none focus:border-green-500 transition-all dark:text-white resize-none">${qText}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">${oH}</div>
                    </div>
                `;
            });
            document.getElementById('finalCountBadge'); 
            document.getElementById('view-editor').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('view-editor').offsetTop - 50, behavior: 'smooth' });
        }

        async function saveExamToFirebase() {
            if(!currentUser) return alert("ล็อกอินก่อนนะครับ!");
            const title = document.getElementById('finalTitle').value || "ชุดข้อสอบใหม่";
            const cards = document.querySelectorAll('.q-item');
            
            const examData = {
                title: title, uid: currentUser.uid, owner: currentUser.displayName || currentUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };

            cards.forEach(function(c) {
                const options = [];
                c.querySelectorAll('.flex.items-center').forEach(function(row) {
                    options.push({ text: row.querySelector('.val-opt').value, isCorrect: row.querySelector('input[type="radio"]').checked });
                });
                examData.questions.push({ q: c.querySelector('.val-q').value, options: options });
            });

            try {
                await db.collection('exams').add(examData);
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                alert("บันทึกสำเร็จเรียบร้อยครับ!"); switchTab('db');
            } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse"><i class="fa-solid fa-cloud-arrow-down text-4xl mb-4 text-green-500"></i><br>กำลังดึงข้อมูล...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(function(doc) {
                    const data = doc.data();
                    const isM = currentUser && data.uid === currentUser.uid;
                    if(isMarkAdmin || isM || data.visibility === 'public') {
                        const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString('th-TH') : '-';
                        grid.innerHTML += `
                            <div class="app-card p-6 md:p-8 border border-gray-50 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isMarkAdmin || isM) ? `<button onclick="deleteExamByID('${doc.id}')" class="absolute top-4 right-4 text-red-100 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase border ${data.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${data.visibility}</span>
                                    <h3 class="font-black text-xl mt-4 mb-2 leading-tight dark:text-white line-clamp-2">${data.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">โดย: ${data.owner} • ${date}</p>
                                </div>
                                <div class="space-y-2">
                                    <button class="w-full py-4 bg-gray-50 border rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-green-500 hover:text-white transition-all dark:bg-gray-700">Open Exam (${data.questions.length})</button>
                                    ${isMarkAdmin ? `<button onclick="toggleVisibility('${doc.id}','${data.visibility}')" class="w-full py-2 text-[9px] font-black text-blue-500 underline uppercase tracking-tighter">สลับสถานะ</button>` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'Error loading: ' + e.message; }
        }

        async function toggleVisibility(id, cur) {
            await db.collection('exams').doc(id).update({ visibility: (cur==='public'?'private':'public') });
            fetchExams();
        }
        async function deleteExamByID(id) {
            if(confirm("ลบถาวร? (สำหรับแอดมินหรือเจ้าของ)")) { await db.collection('exams').doc(id).delete(); fetchExams(); }
        }

        // ==========================================
        // 5. THEMES & APP SETTINGS
        // ==========================================
        function toggleSidebar() { document.getElementById('sideSettings').classList.toggle('translate-x-full'); }
        
        function updateAppTheme(name) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(name !== 'green') document.body.classList.add('theme-' + name);
            localStorage.setItem('mk_v3_theme', name);
        }

        function switchPage(target) {
            ['db','import','ai','chat'].forEach(function(x) {
                document.getElementById('view-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active');
            });
            document.getElementById('view-'+target).classList.remove('hidden');
            document.getElementById('btn-'+target).classList.add('active');
            document.getElementById('view-editor').classList.add('hidden');
            if(target==='db') fetchExams();
        }

        function saveAdminSettings() {
            if(!isMarkAdmin) return;
            localStorage.setItem('mk_official_key', document.getElementById('adm-key').value);
            localStorage.setItem('mk_official_name', document.getElementById('adm-name').value);
            localStorage.setItem('mk_official_img', document.getElementById('adm-img').value);
            localStorage.setItem('mk_official_persona', document.getElementById('adm-persona').value);
            loadAI(); alert("บันทึกข้อมูลเรียบร้อยแล้วครับแอดมิน Mark!");
        }

        function loadAI() {
            const n = localStorage.getItem('mk_official_name') || "AI Smart Tutor";
            const i = localStorage.getItem('mk_official_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-name-chat').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            document.getElementById('ai-img-chat').src = i;
            
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getMyApiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_official_persona') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_v3_theme')) updateAppTheme(localStorage.getItem('mk_v3_theme'));
            loadAI(); switchPage('db');
        };
    </script>
</body>
