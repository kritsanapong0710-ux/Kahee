<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBuilder Pro - Mark Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-color: #22c55e; --main-bg: #f0fdf4; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--main-bg); transition: background 0.3s; }
        .app-card { background: #ffffff; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-main { background-color: var(--main-color); color: white; transition: all 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .tab-active { background-color: var(--main-color); color: white !important; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Dark Mode Mockup */
        body.dark-theme { background-color: #1a1a1a; color: #f3f4f6; }
        body.dark-theme .app-card, body.dark-theme nav { background-color: #2d2d2d; border-color: #404040; color: white; }
        body.dark-theme input, body.dark-theme textarea, body.dark-theme select { background-color: #3d3d3d; border-color: #4d4d4d; color: white; }
        
        /* Blue Theme */
        body.blue-theme { --main-color: #3b82f6; --main-bg: #eff6ff; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="btn-main p-2.5 rounded-2xl shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight"><span id="txt-logo">QuizBuilder</span> <span class="text-green-500" id="logo-pro">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleSettings()" class="text-gray-400 hover:text-green-500 p-2 transition-colors">
                    <i class="fa-solid fa-gear text-xl"></i>
                </button>
                <div id="authArea">
                    <button onclick="openLoginModal()" class="btn-main px-6 py-2 rounded-full font-bold text-sm shadow-md">Login</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 mt-6">
        
        <div class="flex bg-white/50 backdrop-blur p-1.5 rounded-3xl shadow-sm mb-8 gap-1 overflow-x-auto no-scrollbar border border-white/20">
            <button onclick="switchTab('db')" id="btn-db" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400 tab-active">
                <i class="fa-solid fa-database mb-1 block md:inline md:mr-1"></i> <span class="lang-db">คลังข้อสอบ</span>
            </button>
            <button onclick="switchTab('import')" id="btn-import" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-solid fa-paste mb-1 block md:inline md:mr-1"></i> <span class="lang-import">ใส่ข้อมูล</span>
            </button>
            <button onclick="switchTab('ai')" id="btn-ai" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-solid fa-wand-magic-sparkles mb-1 block md:inline md:mr-1"></i> <span class="lang-ai">AI สร้างให้</span>
            </button>
            <button onclick="switchTab('chat')" id="btn-chat" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-regular fa-comment mb-1 block md:inline md:mr-1"></i> <span class="lang-chat">คุยกับ AI</span>
            </button>
        </div>

        <div id="tab-db" class="animate__animated animate__fadeIn">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white lang-db-title">รายการข้อสอบ</h2>
                <button onclick="fetchExams()" class="text-green-500 font-bold text-sm flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> <span class="lang-refresh">รีเฟรช</span>
                </button>
            </div>
            <div id="examsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="tab-import" class="hidden app-card p-6 md:p-10 animate__animated animate__fadeIn">
            <h2 class="text-xl font-bold mb-4 lang-import-title">ป้อนข้อมูลข้อสอบดิบ</h2>
            <textarea id="bulkInput" class="w-full h-72 p-5 bg-gray-50 rounded-2xl outline-none text-lg custom-scroll resize-none border-none focus:ring-2 focus:ring-green-400" placeholder="question*(...) *a(...)correct *b(...)nope"></textarea>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="processRawText()" class="btn-main px-10 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-2">
                    <i class="fa-solid fa-gears"></i> <span class="lang-process">ประมวลผล</span>
                </button>
            </div>
        </div>

        <div id="tab-ai" class="hidden app-card p-10 animate__animated animate__fadeIn text-center">
            <div class="w-20 h-20 bg-green-50 text-green-500 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl">
                <i class="fa-solid fa-robot"></i>
            </div>
            <h2 class="text-2xl font-bold mb-8 lang-ai-title">ให้ AI ช่วยออกข้อสอบ</h2>
            <div class="max-w-lg mx-auto space-y-4">
                <input type="text" id="aiTopic" placeholder="เช่น วิทยาศาสตร์ ม.3 เรื่องพันธุกรรม" class="w-full p-4 bg-gray-50 rounded-2xl font-medium outline-none">
                <div class="flex gap-4">
                    <select id="aiQty" class="p-4 bg-gray-50 rounded-2xl font-bold outline-none flex-1">
                        <option value="5">5 ข้อ</option>
                        <option value="10">10 ข้อ</option>
                    </select>
                    <button onclick="generateExamWithAI()" id="aiGenBtn" class="btn-main px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-sparkles"></i> <span class="lang-gen">สร้างทันที</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-chat" class="hidden app-card p-6 animate__animated animate__fadeIn flex flex-col h-[600px]">
            <div id="chatWindow" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll mb-4 p-2">
                <div class="bg-gray-100 text-gray-700 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm">
                    สวัสดีครับ! ผมคือ AI ประจำตัวของคุณ Mark อยากให้ผมช่วยสรุปเนื้อหาบทไหน พิมพ์ถามได้เลยครับ
                </div>
            </div>
            <div class="flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <input type="text" id="chatInput" placeholder="คุยกับ AI..." class="flex-1 bg-transparent p-3 outline-none" onkeypress="if(event.key === 'Enter') sendChat()">
                <button onclick="sendChat()" class="btn-main w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div id="editorView" class="hidden mt-10 space-y-6 pb-20">
            <div id="qList" class="space-y-4"></div>
            <div class="fixed bottom-6 left-4 right-4 max-w-lg mx-auto bg-white p-4 rounded-3xl shadow-2xl border border-green-100 flex gap-3 items-center z-40">
                <input type="text" id="saveTitle" placeholder="ชื่อชุดข้อสอบ" class="flex-1 p-3 bg-gray-50 rounded-xl outline-none font-bold text-center">
                <button onclick="saveExamToCloud()" class="btn-main px-8 py-3 rounded-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> บันทึก
                </button>
            </div>
        </div>

    </main>

    <div id="settingsPanel" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[100] border-l border-gray-100 flex flex-col">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h3 class="font-bold text-lg lang-settings">ตั้งค่า</h3>
            <button onclick="toggleSettings()" class="text-gray-300 hover:text-red-500 text-2xl">&times;</button>
        </div>
        <div class="p-6 space-y-8 flex-1 overflow-y-auto custom-scroll">
            <div class="space-y-4">
                <h4 class="font-bold text-sm text-gray-400 uppercase tracking-widest lang-personal">ปรับแต่งส่วนตัว</h4>
                
                <div>
                    <label class="block text-xs font-bold mb-2">ธีมสี (Themes)</label>
                    <div class="flex gap-2">
                        <button onclick="changeTheme('green')" class="w-8 h-8 rounded-full bg-green-500 border-2 border-white shadow-sm"></button>
                        <button onclick="changeTheme('blue')" class="w-8 h-8 rounded-full bg-blue-500 border-2 border-white shadow-sm"></button>
                        <button onclick="changeTheme('dark')" class="w-8 h-8 rounded-full bg-gray-800 border-2 border-white shadow-sm"></button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold mb-2">ภาษา (Language)</label>
                    <select id="langChoice" onchange="changeLang(this.value)" class="w-full p-2 rounded-lg bg-gray-50 text-sm font-bold">
                        <option value="th">ภาษาไทย</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <div id="adminZone" class="hidden space-y-4 bg-green-50 p-5 rounded-3xl border border-green-100 animate__animated animate__fadeInUp">
                <h4 class="font-bold text-green-700 text-sm flex items-center gap-2 border-b border-green-200 pb-2">
                    <i class="fa-solid fa-user-shield"></i> Admin Control
                </h4>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">GEMINI API KEY</label>
                    <input type="password" id="apiKeyInp" class="w-full p-2 text-xs border rounded-lg outline-none font-mono">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1">AI PERSONALITY</label>
                    <textarea id="aiPersonaInp" class="w-full p-2 text-xs border rounded-lg h-24 resize-none outline-none" placeholder="เป็นแอดมิน Mark สุดเท่..."></textarea>
                </div>
                <button onclick="updateAdminSettings()" class="w-full bg-gray-800 text-white py-2 rounded-xl text-xs font-bold shadow-lg">SAVE ADMIN SETTINGS</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn">
            <h3 class="text-2xl font-bold text-center mb-8 lang-login-title">เข้าสู่ระบบ</h3>
            <div class="space-y-4">
                <button onclick="authSocial('google')" class="w-full bg-white border border-gray-200 py-3 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-50 shadow-sm">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Google
                </button>
                <div class="flex items-center gap-3 my-4">
                    <div class="flex-1 h-px bg-gray-100"></div>
                    <span class="text-[10px] text-gray-300 font-bold">หรือ</span>
                    <div class="flex-1 h-px bg-gray-100"></div>
                </div>
                <div class="space-y-3">
                    <input type="email" id="emailInp" placeholder="อีเมล / เบอร์โทร" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-medium">
                    <input type="password" id="pwdInp" placeholder="รหัสผ่าน" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-medium">
                    <button onclick="authEmail()" class="w-full btn-main py-4 rounded-2xl font-bold shadow-lg shadow-green-100">Login / Sign Up</button>
                </div>
            </div>
            <button onclick="closeLoginModal()" class="w-full mt-8 text-gray-400 text-sm font-bold">ยกเลิก</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIG & INIT
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "Kritsanapong0710@gmail.com";
        const DEFAULT_AI_KEY = "AIzaSyCu8V3wiyBXqMPKew8B97tP0cD7D2ra1uw";

        let currentUser = null;
        let isAdmin = false;

        // ==========================================
        // 2. AUTHENTICATION
        // ==========================================
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const area = document.getElementById('authArea');
            if (user) {
                isAdmin = (user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) || (user.phoneNumber === '+66967358298');
                area.innerHTML = `
                    <div class="flex items-center gap-3 bg-gray-50 p-1 pr-4 rounded-full border border-gray-100 shadow-sm animate__animated animate__fadeIn">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=' + (user.displayName || 'Mark')}" class="w-8 h-8 rounded-full border-2 border-white shadow-sm">
                        <span class="text-xs font-bold text-gray-700 max-w-[80px] truncate">${user.displayName || 'Mark'}</span>
                        <button onclick="auth.signOut()" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                `;
                if(isAdmin) document.getElementById('adminZone').classList.remove('hidden');
                closeLoginModal();
                fetchExams();
            } else {
                area.innerHTML = `<button onclick="openLoginModal()" class="btn-main px-6 py-2 rounded-full font-bold text-sm shadow-md">Login</button>`;
                document.getElementById('adminZone').classList.add('hidden');
            }
        });

        function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }

        async function authSocial(prov) {
            const provider = (prov === 'google') ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (e) { alert(e.message); }
        }

        async function authEmail() {
            const email = document.getElementById('emailInp').value;
            const pwd = document.getElementById('pwdInp').value;
            try {
                await auth.signInWithEmailAndPassword(email, pwd).catch(async (e) => {
                    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                        await auth.createUserWithEmailAndPassword(email, pwd);
                        alert("สร้างบัญชีและเข้าสู่ระบบสำเร็จ!");
                    } else throw e;
                });
            } catch (e) { alert(e.message); }
        }

        // ==========================================
        // 3. AI LOGIC (GEMINI v1 STABLE)
        // ==========================================
        function getAiKey() { return localStorage.getItem('mk_ai_key') || DEFAULT_AI_KEY; }

        async function callGemini(promptText) {
            const key = getAiKey();
            const persona = localStorage.getItem('mk_ai_persona') || "คุณเป็นผู้เชี่ยวชาญด้านการออกข้อสอบ";
            const finalPrompt = `[คำสั่งระบบ: ${persona}]\n\n${promptText}`;
            
            // 🔴 แก้ไขโมเดลให้เป็น v1 Stable 🔴
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        async function generateExamWithAI() {
            const topic = document.getElementById('aiTopic').value;
            const qty = document.getElementById('aiQty').value;
            if(!topic) return alert("ระบุหัวข้อก่อนครับ");
            
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> กำลังเสก...`;
            btn.disabled = true;

            const prompt = `ช่วยออกข้อสอบ ${qty} ข้อ เรื่อง "${topic}" รูปแบบโค้ดห้ามมีอธิบาย: question*(คำถาม) *a(ตัวเลือก1)correct *b(ตัวเลือก2)nope *c(ตัวเลือก3)nope *d(ตัวเลือก4)nope`;

            try {
                const result = await callGemini(prompt);
                document.getElementById('bulkInput').value = result;
                switchTab('import');
                processRawText();
            } catch (e) { alert("AI Error: " + e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> สร้างทันที`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const inp = document.getElementById('chatInput');
            const box = document.getElementById('chatWindow');
            if(!inp.value) return;

            const myMsg = inp.value;
            inp.value = '';
            box.innerHTML += `<div class="self-end bg-green-500 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm ml-auto animate__animated animate__fadeInRight">${myMsg}</div>`;
            box.scrollTop = box.scrollHeight;

            const lid = 'l-' + Date.now();
            box.innerHTML += `<div id="${lid}" class="bg-gray-100 text-gray-400 p-3 rounded-2xl rounded-tl-none w-fit text-xs animate-pulse">AI กำลังประมวลผล...</div>`;

            try {
                const aiMsg = await callGemini(myMsg);
                document.getElementById(lid).remove();
                box.innerHTML += `<div class="bg-gray-50 text-gray-700 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm animate__animated animate__fadeInLeft shadow-sm border border-white/50">${aiMsg.replace(/\n/g, '<br>')}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lid).innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ AI"; }
        }

        // ==========================================
        // 4. DATABASE & PARSER
        // ==========================================
        function processRawText() {
            const text = document.getElementById('bulkInput').value;
            const list = document.getElementById('qList');
            list.innerHTML = '';
            
            const rawQs = text.split('question*(').filter(q => q.trim() !== '');
            rawQs.forEach((qBlock, i) => {
                const parts = qBlock.split(')');
                if(parts.length < 2) return;
                const qText = parts[0].trim();
                const optRegex = /\*([a-z0-9])\((.*?)\)(correct|nope)/gi;
                let match, optsHtml = '';
                
                while ((match = optRegex.exec(parts[1])) !== null) {
                    optsHtml += `
                        <div class="flex items-center gap-3 p-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <input type="radio" name="qo_${i}" ${match[3] === 'correct' ? 'checked' : ''} class="accent-green-500 w-5 h-5">
                            <span class="font-bold text-gray-400 uppercase">${match[1]}.</span>
                            <input type="text" value="${match[2]}" class="flex-1 bg-transparent outline-none font-medium">
                        </div>
                    `;
                }

                list.innerHTML += `
                    <div class="q-block app-card p-6 md:p-8 animate__animated animate__fadeInUp relative group">
                        <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash"></i></button>
                        <h4 class="font-bold text-gray-800 text-lg mb-4 border-b pb-2"><span class="text-green-500 mr-2">#${i+1}</span> <textarea class="w-full bg-transparent outline-none inline-block">${qText}</textarea></h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${optsHtml}</div>
                    </div>
                `;
            });
            document.getElementById('editorView').classList.remove('hidden');
        }

        async function saveExamToCloud() {
            if(!currentUser) return alert("ล็อกอินก่อนนะครับ!");
            const title = document.getElementById('saveTitle').value || "ข้อสอบไม่มีชื่อ";
            const qBlocks = document.querySelectorAll('.q-block');
            
            const examData = {
                title: title, uid: currentUser.uid, owner: currentUser.displayName || 'Mark',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };

            qBlocks.forEach(block => {
                const opts = [];
                block.querySelectorAll('.flex.items-center').forEach(opt => {
                    opts.push({ text: opt.querySelector('input[type="text"]').value, isCorrect: opt.querySelector('input[type="radio"]').checked });
                });
                examData.questions.push({ q: block.querySelector('textarea').value, options: opts });
            });

            try {
                await db.collection('exams').add(examData);
                alert('บันทึกเข้าคลังเรียบร้อยครับ!');
                switchTab('db');
                fetchExams();
            } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-300">กำลังโหลด...</div>`;
            try {
                const snap = await db.collection('exams').orderBy('createdAt', 'desc').get();
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const isOwner = currentUser && (data.uid === currentUser.uid);
                    if(isAdmin || isOwner || data.visibility === 'public') {
                        const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : '-';
                        grid.innerHTML += `
                            <div class="app-card p-6 border border-gray-100 flex flex-col justify-between hover:scale-[1.02] transition-all relative">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-bold px-3 py-1 rounded-full ${data.visibility === 'public' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400'}">${data.visibility.toUpperCase()}</span>
                                    ${isAdmin ? `<button onclick="deleteExam('${doc.id}')" class="text-red-200 hover:text-red-500"><i class="fa-solid fa-trash text-sm"></i></button>` : ''}
                                </div>
                                <h3 class="font-bold text-gray-800 text-lg leading-tight mb-2">${data.title}</h3>
                                <p class="text-[10px] text-gray-400 mb-6">โดย: ${data.owner} • ${date}</p>
                                <button class="w-full py-3 bg-gray-50 border border-gray-100 rounded-xl text-xs font-bold text-gray-600 hover:bg-green-500 hover:text-white transition-all">เปิดดู (${data.questions.length} ข้อ)</button>
                                ${isAdmin ? `
                                    <button onclick="togglePublic('${doc.id}', '${data.visibility}')" class="mt-2 text-[10px] text-blue-500 font-bold hover:underline">เปลี่ยนสถานะ (ADMIN ONLY)</button>
                                ` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-300">${e.message}</div>`; }
        }

        async function togglePublic(id, current) {
            await db.collection('exams').doc(id).update({ visibility: current === 'public' ? 'private' : 'public' });
            fetchExams();
        }

        async function deleteExam(id) {
            if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExams(); }
        }

        // ==========================================
        // 5. USER SETTINGS & UI
        // ==========================================
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('translate-x-full'); }
        
        function changeTheme(theme) {
            document.body.classList.remove('blue-theme', 'dark-theme');
            if(theme === 'blue') document.body.classList.add('blue-theme');
            if(theme === 'dark') document.body.classList.add('dark-theme');
            localStorage.setItem('mk_theme', theme);
        }

        function changeLang(lang) {
            const isEn = lang === 'en';
            document.querySelectorAll('.lang-db').forEach(e => e.innerText = isEn ? "Exam Library" : "คลังข้อสอบ");
            document.querySelectorAll('.lang-import').forEach(e => e.innerText = isEn ? "Import Raw" : "ใส่ข้อมูล");
            document.querySelectorAll('.lang-ai').forEach(e => e.innerText = isEn ? "AI Gen" : "AI สร้างให้");
            document.querySelectorAll('.lang-chat').forEach(e => e.innerText = isEn ? "AI Tutor" : "คุยกับ AI");
            document.querySelectorAll('.lang-db-title').forEach(e => e.innerText = isEn ? "Exam List" : "รายการข้อสอบ");
            document.querySelectorAll('.lang-refresh').forEach(e => e.innerText = isEn ? "Refresh" : "รีเฟรช");
            document.querySelectorAll('.lang-import-title').forEach(e => e.innerText = isEn ? "Paste Raw Data" : "ป้อนข้อมูลข้อสอบดิบ");
            document.querySelectorAll('.lang-process').forEach(e => e.innerText = isEn ? "Process" : "ประมวลผล");
            document.querySelectorAll('.lang-ai-title').forEach(e => e.innerText = isEn ? "AI Smart Generator" : "ให้ AI ช่วยออกข้อสอบ");
            document.querySelectorAll('.lang-gen').forEach(e => e.innerText = isEn ? "Generate" : "สร้างทันที");
            document.querySelectorAll('.lang-settings').forEach(e => e.innerText = isEn ? "Settings" : "ตั้งค่า");
            document.querySelectorAll('.lang-personal').forEach(e => e.innerText = isEn ? "Personalization" : "ปรับแต่งส่วนตัว");
            document.querySelectorAll('.lang-login-title').forEach(e => e.innerText = isEn ? "Sign In" : "เข้าสู่ระบบ");
            localStorage.setItem('mk_lang', lang);
        }

        function switchTab(tab) {
            const tabs = ['import', 'ai', 'chat', 'db'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            if(tab === 'db') fetchExams();
        }

        function updateAdminSettings() {
            localStorage.setItem('mk_ai_key', document.getElementById('apiKeyInp').value);
            localStorage.setItem('mk_ai_persona', document.getElementById('aiPersonaInp').value);
            alert("บันทึกการตั้งค่า Admin แล้วครับ!");
            toggleSettings();
        }

        window.onload = () => {
            if(localStorage.getItem('mk_theme')) changeTheme(localStorage.getItem('mk_theme'));
            if(localStorage.getItem('mk_lang')) {
                document.getElementById('langChoice').value = localStorage.getItem('mk_lang');
                changeLang(localStorage.getItem('mk_lang'));
            }
            if(localStorage.getItem('mk_ai_key')) document.getElementById('apiKeyInp').value = localStorage.getItem('mk_ai_key');
            if(localStorage.getItem('mk_ai_persona')) document.getElementById('aiPersonaInp').value = localStorage.getItem('mk_ai_persona');
            switchTab('db');
        };
    </script>
</body>
</html>
