<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBuilder Pro - Final Fixed for Mark</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        /* ระบบจัดการสีแบบ Dynamic */
        :root {
            --primary: #22c55e;
            --bg-body: #f0fdf4;
            --text-main: #1f2937;
            --card-bg: #ffffff;
            --input-bg: #f9fafb;
        }

        /* ธีมน้ำเงิน (ปรับปรุงให้อ่านง่าย) */
        body.theme-blue {
            --primary: #3b82f6;
            --bg-body: #eff6ff;
            --text-main: #ffffff; /* เปลี่ยนเป็นขาวเพื่อให้อ่านง่ายบนพื้นน้ำเงิน */
            --card-bg: #1e3a8a;
            --input-bg: #2563eb;
        }

        /* ธีมมืด */
        body.theme-dark {
            --primary: #10b981;
            --bg-body: #0f172a;
            --text-main: #f8fafc;
            --card-bg: #1e293b;
            --input-bg: #334155;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            transition: all 0.3s ease; 
        }

        .app-card { background-color: var(--card-bg); border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .btn-main { 
            background-color: var(--primary); 
            color: white; 
            transition: 0.3s; 
            border-radius: 1.2rem;
            font-weight: 600;
        }
        
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }

        .tab-btn { color: #9ca3af; font-weight: 700; transition: 0.3s; }
        .tab-active { 
            background-color: var(--primary); 
            color: white !important; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-gray-100 dark:bg-gray-800 dark:border-gray-700">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="btn-main p-2.5 rounded-2xl shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">QuizBuilder <span class="text-green-500">Pro</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleSettings()" class="text-gray-400 hover:text-green-500 p-2"><i class="fa-solid fa-gear text-xl"></i></button>
                <div id="authDisplay"><button onclick="openAuth()" class="btn-main px-6 py-2 text-sm">Login</button></div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 mt-6">
        
        <div class="flex bg-white p-1.5 rounded-3xl shadow-sm mb-8 gap-1 overflow-x-auto no-scrollbar border border-gray-100 dark:bg-gray-700">
            <button onclick="switchTab('db')" id="btn-db" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm tab-active">
                <i class="fa-solid fa-database mr-1"></i> คลังข้อสอบ
            </button>
            <button onclick="switchTab('import')" id="btn-import" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-solid fa-paste mr-1"></i> ใส่ข้อสอบ
            </button>
            <button onclick="switchTab('ai')" id="btn-ai" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-solid fa-robot mr-1"></i> AI สร้างให้
            </button>
            <button onclick="switchTab('chat')" id="btn-chat" class="flex-1 min-w-[100px] py-3 rounded-2xl font-bold text-xs md:text-sm transition-all text-gray-400">
                <i class="fa-regular fa-comment mr-1"></i> คุยกับ AI
            </button>
        </div>

        <div id="tab-db" class="animate__animated animate__fadeIn">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">ข้อสอบที่มีอยู่</h2>
                <button onclick="fetchExams()" class="text-green-500 font-bold text-sm"><i class="fa-solid fa-rotate mr-1"></i> รีเฟรช</button>
            </div>
            <div id="examsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="tab-import" class="hidden app-card p-6 md:p-10 animate__animated animate__fadeIn">
            <h2 class="text-xl font-bold mb-4">วางข้อมูลข้อสอบดิบ</h2>
            <textarea id="bulkInput" class="w-full h-64 p-5 rounded-3xl outline-none text-lg border border-gray-100 bg-gray-50 dark:bg-gray-900" placeholder="question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope"></textarea>
            <div class="mt-4 flex justify-end">
                <button onclick="processRawText()" class="btn-main px-10 py-3 rounded-2xl font-bold">ประมวลผล</button>
            </div>
        </div>

        <div id="tab-ai" class="hidden app-card p-10 animate__animated animate__fadeIn text-center">
            <div class="w-24 h-24 rounded-3xl mx-auto mb-6 shadow-lg overflow-hidden border-4 border-white">
                <img id="ai-img-gen" src="https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff" class="w-full h-full object-cover">
            </div>
            <h2 class="text-2xl font-bold mb-2" id="ai-name-gen">AI Assistant</h2>
            <p class="text-gray-400 mb-8 text-sm">เพียงระบุหัวข้อที่คุณต้องการ AI จะออกข้อสอบให้ทันที</p>
            <div class="max-w-md mx-auto space-y-4">
                <input type="text" id="aiTopic" placeholder="เช่น วิทยาศาสตร์ ม.3 เรื่องระบบสุริยะ" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none font-bold text-center dark:bg-gray-900">
                <button onclick="generateExamWithAI()" id="aiGenBtn" class="btn-main w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-sparkles"></i> เริ่มสร้างข้อสอบ
                </button>
            </div>
        </div>

        <div id="tab-chat" class="hidden app-card p-6 animate__animated animate__fadeIn flex flex-col h-[600px]">
            <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll mb-4 p-2">
                </div>
            <div class="flex gap-2 bg-gray-50 p-2 rounded-2xl dark:bg-gray-900">
                <input type="text" id="chatIn" class="flex-1 bg-transparent p-3 outline-none" placeholder="คุยกับ AI..." onkeypress="if(event.key=='Enter')sendChat()">
                <button onclick="sendChat()" class="btn-main w-12 h-12 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="editorView" class="hidden mt-10 space-y-4 pb-20">
            <div id="qList" class="space-y-4"></div>
            <div class="fixed bottom-6 left-4 right-4 max-w-md mx-auto bg-white p-4 rounded-3xl shadow-2xl border border-green-100 flex gap-2 dark:bg-gray-800">
                <input type="text" id="saveTitle" placeholder="ชื่อชุดข้อสอบ" class="flex-1 p-2 bg-gray-50 rounded-xl outline-none font-bold text-center dark:bg-gray-700">
                <button onclick="saveToFirebase()" class="btn-main px-6 py-2 rounded-xl">บันทึก</button>
            </div>
        </div>
    </main>

    <div id="sideSettings" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[100] border-l p-6 dark:bg-gray-900">
        <div class="flex justify-between items-center mb-10">
            <h3 class="font-bold text-xl">ตั้งค่าระบบ</h3>
            <button onclick="toggleSettings()" class="text-2xl">&times;</button>
        </div>
        <div class="space-y-8">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-4 uppercase">Personalize Theme</label>
                <div class="flex gap-4">
                    <button onclick="setTheme('green')" class="w-10 h-10 rounded-full bg-green-500 border-4 border-white shadow-md"></button>
                    <button onclick="setTheme('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-4 border-white shadow-md"></button>
                    <button onclick="setTheme('dark')" class="w-10 h-10 rounded-full bg-gray-800 border-4 border-white shadow-md"></button>
                </div>
            </div>

            <div id="adminZone" class="hidden bg-red-50 p-5 rounded-3xl border border-red-100 dark:bg-red-900/10">
                <h4 class="font-bold text-red-700 text-sm mb-4 flex items-center gap-2 border-b border-red-200 pb-2">
                    <i class="fa-solid fa-lock"></i> Mark Admin Power
                </h4>
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-bold text-red-300 mb-1">GEMINI API KEY</label>
                        <input type="password" id="adm-key" class="w-full p-2 text-xs border rounded-xl outline-none font-mono">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-red-300 mb-1">AI NAME (ชื่อ AI)</label>
                        <input type="text" id="adm-name" placeholder="AI Tutor" class="w-full p-2 text-xs border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-red-300 mb-1">AI IMAGE (URL รูปภาพ)</label>
                        <input type="text" id="adm-img" placeholder="https://..." class="w-full p-2 text-xs border rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-red-300 mb-1">AI SYSTEM PERSONA</label>
                        <textarea id="adm-persona" class="w-full p-2 text-xs border rounded-xl h-20 resize-none outline-none" placeholder="สั่งให้ AI เป็นอะไร..."></textarea>
                    </div>
                    <button onclick="saveAdminConfigs()" class="w-full bg-red-600 text-white py-2 rounded-xl text-xs font-bold shadow-lg">SAVE ALL SETTINGS</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authTitle" class="text-2xl font-bold text-center mb-8">เข้าสู่ระบบ</h3>
            
            <div class="space-y-4">
                <button onclick="authSocial('google')" class="w-full bg-white border py-3 rounded-2xl font-bold flex justify-center gap-2 hover:bg-gray-50 shadow-sm dark:bg-gray-700">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Google Account
                </button>
                <button onclick="authSocial('facebook')" class="w-full bg-[#1877F2] text-white py-3 rounded-2xl font-bold flex justify-center gap-2 shadow-md">
                    <i class="fa-brands fa-facebook"></i> Facebook
                </button>
                
                <div class="flex items-center gap-2 text-[10px] text-gray-300 font-bold uppercase py-2">
                    <hr class="flex-1"> <span>หรือใช้อีเมล</span> <hr class="flex-1">
                </div>

                <div class="space-y-2">
                    <input type="email" id="email" placeholder="Email / Phone" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-medium dark:bg-gray-700">
                    <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none font-medium dark:bg-gray-700">
                </div>
                
                <div id="loginGroup">
                    <button onclick="authEmail('login')" class="btn-main w-full py-4 rounded-2xl font-bold shadow-lg">Login</button>
                    <p class="text-center text-[10px] mt-4 text-gray-400">ยังไม่มีบัญชี? <a href="javascript:switchAuth('sign')" class="text-green-500 font-bold underline">สมัครสมาชิก</a></p>
                </div>
                <div id="signGroup" class="hidden">
                    <button onclick="authEmail('sign')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">Create Account</button>
                    <p class="text-center text-[10px] mt-4 text-gray-400">มีบัญชีแล้ว? <a href="javascript:switchAuth('login')" class="text-blue-500 font-bold underline">กลับไปเข้าสู่ระบบ</a></p>
                </div>
            </div>
            <button onclick="closeAuth()" class="w-full mt-10 text-gray-300 text-[10px] font-bold uppercase tracking-widest">ยกเลิก</button>
        </div>
    </div>

    <script>
        // 1. FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const ADMIN_MARK_EMAIL = "Kritsanapong0710@gmail.com";
        const DEFAULT_AI_KEY = "AIzaSyCu8V3wiyBXqMPKew8B97tP0cD7D2ra1uw";

        let currentU = null;
        let isA = false;

        // 2. AUTHENTICATION LISTENER
        auth.onAuthStateChanged(function(user) {
            currentU = user;
            const area = document.getElementById('authDisplay');
            if (user) {
                // BUG FIX: Case-insensitive email check
                isA = (user.email && user.email.toLowerCase() === ADMIN_MARK_EMAIL.toLowerCase()) || (user.phoneNumber === '+66967358298');
                
                area.innerHTML = `
                    <div class="flex items-center gap-2 bg-gray-50 p-1 pr-3 rounded-full border dark:bg-gray-700">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=User'}" class="w-8 h-8 rounded-full">
                        <span class="text-xs font-bold max-w-[80px] truncate">${user.displayName || 'User'}</span>
                        <button onclick="auth.signOut()" class="text-red-400 ml-1"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                `;
                if(isA) document.getElementById('adminZone').classList.remove('hidden');
                closeAuth();
                fetchExams();
            } else {
                area.innerHTML = `<button onclick="openAuth()" class="btn-main px-6 py-2 text-sm shadow-md">Login</button>`;
                document.getElementById('adminZone').classList.add('hidden');
                isA = false;
                fetchExams();
            }
        });

        function openAuth() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuth(m) {
            document.getElementById('loginGroup').classList.toggle('hidden', m==='sign');
            document.getElementById('signGroup').classList.toggle('hidden', m==='login');
            document.getElementById('authTitle').innerText = (m==='login') ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
        }

        async function authSocial(prov) {
            const p = (prov === 'google') ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try { await auth.signInWithPopup(p); } catch (e) { alert(e.message); }
        }

        async function authEmail(mode) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(mode === 'sign') await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch (x) { alert(x.message); }
        }

        // 3. AI SYSTEM (FIXED BUG VERSION)
        function getAiKey() { return localStorage.getItem('mk_k') || DEFAULT_AI_KEY; }

        async function callGeminiAPI(promptText) {
            const key = getAiKey();
            const persona = localStorage.getItem('mk_p') || "คุณเป็นติวเตอร์อัจฉริยะ";
            const body = { contents: [{ parts: [{ text: `[SYSTEM: ${persona}]\n\n${promptText}` }] }] };

            // 🔴 BUG FIX: ระบบ Auto-Fallback 🔴
            // จะลองไล่ยิงทีละ Endpoint และทีละ Model จนกว่าจะสำเร็จ
            const configs = [
                { ver: 'v1', model: 'gemini-1.5-flash' },
                { ver: 'v1beta', model: 'gemini-1.5-flash' },
                { ver: 'v1', model: 'gemini-pro' }
            ];

            for (let cfg of configs) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/${cfg.ver}/models/${cfg.model}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    }
                } catch (err) {
                    console.warn(`Failed on ${cfg.ver}/${cfg.model}, trying next...`);
                }
            }
            throw new Error("AI Error: ไม่สามารถเชื่อมต่อสมอง AI ได้ (ลองเช็ค API Key ของแอดมิน Mark นะครับ)");
        }

        async function generateExamWithAI() {
            const topic = document.getElementById('aiTopic').value;
            if(!topic) return alert("ระบุหัวข้อก่อนครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังเสกโจทย์...`;
            btn.disabled = true;

            try {
                const prompt = `สร้างข้อสอบ 5 ข้อ เรื่อง "${topic}" ใช้รูปแบบโค้ดนี้เท่านั้น ห้ามพูดอย่างอื่น: question*(คำถาม) *a(ตัวเลือก1)correct *b(ตัวเลือก2)nope *c(ตัวเลือก3)nope *d(ตัวเลือก4)nope`;
                const result = await callGeminiAPI(prompt);
                document.getElementById('bulkInput').value = result;
                document.getElementById('saveTitle').value = topic;
                switchTab('import');
                processRawText();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> เริ่มสร้างข้อสอบ`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatIn');
            const box = document.getElementById('chatBox');
            if(!input.value) return;

            const msg = input.value;
            input.value = '';
            box.innerHTML += `<div class="self-end bg-green-500 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm ml-auto animate__animated animate__fadeInRight shadow-md">${msg}</div>`;
            box.scrollTop = box.scrollHeight;

            const lid = "l-" + Date.now();
            box.innerHTML += `<div id="${lid}" class="text-[10px] font-bold opacity-30 animate-pulse uppercase ml-2">AI กำลังประมวลผล...</div>`;

            try {
                const aiMsg = await callGeminiAPI(msg);
                document.getElementById(lid).remove();
                
                const aiName = localStorage.getItem('mk_n') || "AI Tutor";
                const aiImg = localStorage.getItem('mk_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";

                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${aiImg}" class="w-8 h-8 rounded-full border-2 border-primary">
                        <div class="bg-white text-gray-700 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                            <p class="font-bold text-[10px] text-blue-500 mb-1 uppercase">${aiName}</p>
                            ${aiMsg.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lid).innerText = "ERROR: การเชื่อมต่อล้มเหลว"; }
        }

        // 4. DATABASE & PARSER
        function processRawText() {
            const text = document.getElementById('bulkInput').value;
            const list = document.getElementById('qList');
            list.innerHTML = '';
            
            const rawQs = text.split('question*(').filter(function(q) { return q.trim() !== ''; });
            rawQs.forEach(function(qB, i) {
                const parts = qB.split(')');
                if(parts.length < 2) return;
                const qT = parts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                
                while((m = re.exec(parts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-3 p-3 bg-gray-50 border rounded-2xl dark:bg-gray-700">
                            <input type="radio" name="r_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-5 h-5 accent-green-500">
                            <span class="font-bold text-gray-400 uppercase w-6 text-center">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }

                list.innerHTML += `
                    <div class="q-block app-card p-6 md:p-8 relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-200 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                        <textarea class="w-full bg-transparent font-bold text-lg mb-4 border-b pb-2 outline-none">${qT}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${oH}</div>
                    </div>
                `;
            });
            document.getElementById('editorView').classList.remove('hidden');
        }

        async function saveToFirebase() {
            if(!currentU) return alert("Login ก่อนครับ!");
            const title = document.getElementById('saveTitle').value || "ข้อสอบไม่มีชื่อ";
            const qBlocks = document.querySelectorAll('.q-block');
            
            const data = {
                title: title, uid: currentU.uid, owner: currentU.displayName || currentU.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };

            qBlocks.forEach(function(b) {
                const opts = [];
                b.querySelectorAll('.flex.items-center').forEach(function(o) {
                    opts.push({ text: o.querySelector('input[type="text"]').value, isCorrect: o.querySelector('input[type="radio"]').checked });
                });
                data.questions.push({ q: b.querySelector('textarea').value, options: opts });
            });

            try {
                await db.collection('exams').add(data);
                alert("บันทึกสำเร็จ!");
                switchTab('db');
            } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30">กำลังโหลด...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(function(d) {
                    const x = d.data();
                    const mine = currentU && x.uid === currentU.uid;
                    if(isA || mine || x.visibility === 'public') {
                        grid.innerHTML += `
                            <div class="app-card p-6 border flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isA || mine) ? `<button onclick="deleteExam('${d.id}')" class="absolute top-4 right-4 text-red-200 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[10px] font-bold px-2 py-1 rounded-full ${x.visibility==='public'?'bg-green-100 text-green-600':'bg-gray-100 text-gray-500'}">${x.visibility.toUpperCase()}</span>
                                    <h3 class="font-bold text-lg leading-tight mt-4 mb-2">${x.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 uppercase">โดย: ${x.owner}</p>
                                </div>
                                <button class="w-full py-3 bg-gray-50 border rounded-2xl text-xs font-bold hover:bg-green-500 hover:text-white transition-all dark:bg-gray-700">เปิดดูข้อสอบ (${x.questions.length} ข้อ)</button>
                                ${isA ? `<button onclick="togglePub('${d.id}','${x.visibility}')" class="mt-2 text-[10px] font-bold text-blue-500 underline">สลับสิทธิ์ (Admin Only)</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'เกิดข้อผิดพลาด'; }
        }

        async function togglePub(id, c) {
            await db.collection('exams').doc(id).update({ visibility: (c==='public'?'private':'public') });
            fetchExams();
        }

        async function deleteExam(id) {
            if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExams(); }
        }

        // 5. THEME & SETTINGS & UI
        function toggleSettings() { document.getElementById('sideSettings').classList.toggle('translate-x-full'); }
        
        function setTheme(t) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(t !== 'green') document.body.classList.add('theme-' + t);
            localStorage.setItem('mk_t', t);
        }

        function switchTab(t) {
            ['db','import','ai','chat'].forEach(function(x) {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('tab-active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
            if(t==='db') fetchExams();
        }

        function saveAdminConfigs() {
            if(!isA) return;
            localStorage.setItem('mk_k', document.getElementById('adm-key').value);
            localStorage.setItem('mk_n', document.getElementById('adm-name').value);
            localStorage.setItem('mk_i', document.getElementById('adm-img').value);
            localStorage.setItem('mk_p', document.getElementById('adm-persona').value);
            applyAIProfile();
            alert("บันทึกการตั้งค่า Admin สำเร็จ!");
        }

        function applyAIProfile() {
            const n = localStorage.getItem('mk_n') || "AI Tutor";
            const i = localStorage.getItem('mk_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            
            // อัปเดตในช่อง Input ด้วย
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getAiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_p') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_t')) setTheme(localStorage.getItem('mk_t'));
            applyAIProfile();
            switchTab('db');
        };
    </script>
</body>
</html>
