<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies Original Quiz (Final Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb; /* สีน้ำเงินหลัก */
            --secondary-color: #f1f5f9; /* สีพื้นหลังอ่อน */
            --success-color: #22c55e; /* สีเขียว (ถูก) */
            --error-color: #ef4444; /* สีแดง (ผิด) */
            --text-color: #334155;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        /* Header & Progress Bar */
        .quiz-header {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .progress-container {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Quiz Content */
        .quiz-content {
            padding: 30px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-list {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            color: var(--text-color);
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Prompt', sans-serif;
        }

        .option-btn:hover:not(.disabled) {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .option-btn.selected {
            border-color: var(--primary-color);
            background-color: #eff6ff;
            color: var(--primary-color);
            font-weight: 600;
        }
        
        /* Footer Buttons */
        .quiz-footer {
            padding: 20px 30px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            font-family: 'Prompt', sans-serif;
        }

        .btn-confirm {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-confirm:hover { background-color: #1d4ed8; }
        .btn-confirm:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .btn-exit {
            background-color: transparent;
            color: #64748b;
            border: 2px solid #cbd5e1;
        }
        .btn-exit:hover { background-color: #e2e8f0; color: #334155; }


        /* --- Results View Styles --- */
        #results-view {
            display: none; /* ซ่อนไว้ก่อน */
            padding: 30px;
        }

        .score-summary {
            text-align: center;
            margin-bottom: 40px;
        }
        .score-summary h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary-color); }
        .score-summary p { font-size: 1.2rem; color: #64748b; }

        .review-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid #ccc;
        }
        .review-item.correct { border-left-color: var(--success-color); }
        .review-item.incorrect { border-left-color: var(--error-color); }

        .review-q { font-weight: 600; margin-bottom: 15px; font-size: 1.1rem; }

        .review-option {
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            border: 1px solid #e2e8f0;
        }
        /* review-user-selected: สิ่งที่ผู้ใช้ตอบ */
        .review-user-selected { background-color: #fee2e2; border-color: var(--error-color); color: #991b1b; }
        /* review-correct-answer: คำตอบที่ถูกต้อง */
        .review-correct-answer { background-color: #dcfce7; border-color: var(--success-color); color: #166534; font-weight: 600;}
        /* ถ้าตอบถูก ให้ช่องที่เลือกเป็นสีเขียวไปเลย */
        .review-item.correct .review-user-selected { background-color: #dcfce7; border-color: var(--success-color); color: #166534; }

    </style>
</head>
<body>

<div class="container">
    <div id="quiz-view">
        <div class="quiz-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin:0; color: var(--primary-color);">Social Studies Exam</h2>
                <span id="question-counter" style="color: #64748b; font-weight: 600;">Question 1 / 29</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="quiz-content">
            <div class="question-text" id="question-text">Loading question...</div>
            <div class="options-list" id="options-container">
                </div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-exit" onclick="exitQuiz()">ออก (Exit)</button>
            <button class="btn btn-confirm" id="confirm-btn" onclick="confirmAnswer()" disabled>ยืนยันคำตอบ (Confirm)</button>
        </div>
    </div>

    <div id="results-view">
        <div class="score-summary">
            <h1>ผลการทดสอบ</h1>
            <p>คุณทำได้ <span id="final-score" style="font-weight:bold; color:var(--primary-color); font-size:1.5em;"></span> คะแนน (จาก 29 ข้อ)</p>
        </div>
        
        <h3 style="border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">เฉลยละเอียด (Detailed Review)</h3>
        <div id="review-container">
            </div>

        <div style="text-align: center; margin-top: 30px;">
             <button class="btn btn-confirm" onclick="location.reload()" style="padding: 15px 40px; font-size: 1.1rem;">ทำข้อสอบอีกครั้ง (Restart)</button>
        </div>
    </div>

</div>

<script>
    // Database ข้อสอบ 29 ข้อ (Original ที่คัดมาแล้ว)
    const questionsData = [
        { q: "Once a law has been approved by the House of Representatives, who is it sent to?", o: ["The King", "The Prime Minister", "The Senate", "The Thai people"], a: 2 },
        { q: "The Senate must debate and approve a law within how many days?", o: ["30 days", "7 days", "60 days", "20 days"], a: 2 },
        { q: "During the FIRST READING, the bill is:", o: ["Approved immediately", "Debated in detail", "Sent to King", "Voted on to be considered"], a: 3 },
        { q: "What is 'Royal Endorsement'?", o: ["MPs voting", "The King signing the bill", "Police enforcement", "Public protest"], a: 1 },
        { q: "Where is the law officially printed?", o: ["Newspapers", "School books", "The Royal Gazette", "Facebook"], a: 2 },
        { q: "Which step involves detailed examination by a committee?", o: ["2nd Reading", "Committee Review", "1st Reading", "Senate Approval"], a: 1 },
        { q: "Which step involves debating in detail and suggesting changes?", o: ["3rd Reading", "2nd Reading", "Proposal", "Royal Endorsement"], a: 1 },
        { q: "The final version of the bill is voted on in which step?", o: ["1st Reading", "Committee Review", "3rd Reading", "Publication"], a: 2 },
        { q: "When the bill is officially introduced by an MP, it is called:", o: ["Proposal of a Bill", "Senate Approval", "2nd Reading", "Royal Endorsement"], a: 0 },
        { q: "When was the first constitution of Thailand signed?", o: ["10th Dec 1932", "24th June 1932", "10th Feb 2014"], a: 0 },
        { q: "How many constitutions has Thailand had since 1932?", o: ["15", "20", "25", "35"], a: 1 },
        { q: "In 1973, why were 13 people arrested?", o: ["Theft", "Asking for a constitution", "Tax evasion"], a: 1 },
        { q: "NPKC led a coup in 1991 against which PM?", o: ["Chatichai", "Thaksin", "Suchinda"], a: 0 },
        { q: "Who was ousted in the 2006 Coup?", o: ["Suchinda", "Thaksin Shinawatra", "Prayut"], a: 1 },
        { q: "What is a social institution?", o: ["Party place", "System to organize society", "Group of friends"], a: 1 },
        { q: "Which is an example of a social institution?", o: ["Family", "School", "Government", "All of the above"], a: 3 },
        { q: "Which institution creates and enforces laws?", o: ["Family", "Government", "Religion", "Education"], a: 1 },
        { q: "Why is family important?", o: ["Makes money", "Provides love & teaches values", "Builds hospitals"], a: 1 },
        { q: "Which satisfies need for belief and teaches right/wrong?", o: ["Economic", "Religious", "Emotional", "Family"], a: 1 },
        { q: "What does 'Mesopotamia' mean?", o: ["Land of gold", "Land between rivers", "Great empire"], a: 1 },
        { q: "Mesopotamia was between which rivers?", o: ["Indus/Ganges", "Tigris/Euphrates", "Yellow/Yangtze"], a: 1 },
        { q: "Mesopotamia modern location includes:", o: ["Thailand/Laos", "Iraq/Iran/Syria/Turkey", "India/Pakistan"], a: 1 },
        { q: "Where was Indus (Harappan) civilization found?", o: ["Nile", "Indus/Ganges Rivers", "Yellow River"], a: 1 },
        { q: "Ancient China was located along which river?", o: ["Mekong", "Indus", "Yellow River (Huang He)"], a: 2 },
        { q: "What is a 'Ziggurat'?", o: ["A king", "A religious structure", "A type of food"], a: 1 },
        { q: "Which religion began in East Asia?", o: ["Christianity", "Buddhism and Hindu", "Hebrew"], a: 1 },
        { q: "What is the book of Hinduism called?", o: ["The Bible", "The Veda", "The Koran"], a: 1 },
        { q: "What is the royal ploughing ceremony?", o: ["Birth ceremony", "Crowning ceremony", "Start of planting season"], a: 2 },
        { q: "When do Christians get baptised?", o: ["When they die", "At Christmas", "When they are born"], a: 2 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptionIndex = null; // เก็บตัวเลือกที่ user จิ้มไว้ก่อนกดยืนยัน
    let userAnswers = []; // เก็บประวัติการตอบเพื่อใช้ในหน้าเฉลย

    const quizView = document.getElementById('quiz-view');
    const resultsView = document.getElementById('results-view');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const confirmBtn = document.getElementById('confirm-btn');
    const progressBar = document.getElementById('progress-bar');
    const questionCounter = document.getElementById('question-counter');

    // เริ่มต้นโหลดข้อสอบ
    loadQuestion();

    function loadQuestion() {
        // รีเซ็ตสถานะสำหรับข้อใหม่
        selectedOptionIndex = null;
        confirmBtn.disabled = true;
        optionsContainer.innerHTML = '';

        const currentQData = questionsData[currentQuestionIndex];
        
        // อัปเดต UI
        questionText.innerText = `${currentQuestionIndex + 1}. ${currentQData.q}`;
        questionCounter.innerText = `Question ${currentQuestionIndex + 1} / ${questionsData.length}`;
        
        // อัปเดต Progress Bar
        const progressPercent = ((currentQuestionIndex) / questionsData.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        // สร้างปุ่มตัวเลือก
        currentQData.o.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => selectOption(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // ฟังก์ชันเมื่อผู้ใช้จิ้มเลือกข้อ (ยังไม่ยืนยัน)
    function selectOption(index, btnElement) {
        // ลบ class selected ออกจากปุ่มอื่นๆ
        const allOptions = optionsContainer.querySelectorAll('.option-btn');
        allOptions.forEach(opt => opt.classList.remove('selected'));

        // เพิ่ม class selected ให้ปุ่มที่เลือก
        btnElement.classList.add('selected');
        selectedOptionIndex = index;
        
        // เปิดใช้งานปุ่มยืนยัน
        confirmBtn.disabled = false;
    }

    // ฟังก์ชันเมื่อกดปุ่ม "ยืนยันคำตอบ"
    function confirmAnswer() {
        if (selectedOptionIndex === null) return;

        const currentQData = questionsData[currentQuestionIndex];
        const isCorrect = selectedOptionIndex === currentQData.a;
        
        if (isCorrect) {
            score++;
        }

        // บันทึกประวัติการตอบ
        userAnswers.push({
            question: currentQData.q,
            options: currentQData.o,
            correctIndex: currentQData.a,
            userSelectedIndex: selectedOptionIndex,
            isCorrect: isCorrect
        });

        // ไปข้อถัดไป หรือ จบการสอบ
        currentQuestionIndex++;
        if (currentQuestionIndex < questionsData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    // แสดงหน้าผลลัพธ์และเฉลยละเอียด
    function showResults() {
        quizView.style.display = 'none';
        resultsView.style.display = 'block';

        document.getElementById('final-score').innerText = score;

        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = ''; // เคลียร์ของเก่า

        // วนลูปสร้างเฉลยทีละข้อ
        userAnswers.forEach((answerData, index) => {
            const reviewItem = document.createElement('div');
            reviewItem.className = `review-item ${answerData.isCorrect ? 'correct' : 'incorrect'}`;

            const questionTitle = document.createElement('div');
            questionTitle.className = 'review-q';
            questionTitle.innerHTML = `ข้อที่ ${index + 1}: ${answerData.question} ${answerData.isCorrect ? '<span style="color:var(--success-color); float:right;">✅ ถูกต้อง</span>' : '<span style="color:var(--error-color); float:right;">❌ ผิด</span>'}`;
            reviewItem.appendChild(questionTitle);

            // สร้างรายการตัวเลือกในส่วนเฉลย
            answerData.options.forEach((opt, optIdx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'review-option';
                optDiv.innerText = opt;

                // ไฮไลท์คำตอบที่ผู้ใช้เลือก
                if (optIdx === answerData.userSelectedIndex) {
                    optDiv.classList.add('review-user-selected');
                    // ถ้าผิด ให้เขียนบอกด้วยว่า "คุณตอบข้อนี้"
                    if (!answerData.isCorrect) {
                       optDiv.innerHTML += ' <i>(ที่คุณตอบ)</i>';
                    }
                }
                
                // ไฮไลท์คำตอบที่ถูกต้อง (ถ้าข้อนั้นผู้ใช้ตอบผิด)
                if (optIdx === answerData.correctIndex && !answerData.isCorrect) {
                     optDiv.classList.add('review-correct-answer');
                     optDiv.innerHTML += ' <i>(คำตอบที่ถูก)</i>';
                }

                reviewItem.appendChild(optDiv);
            });

            reviewContainer.appendChild(reviewItem);
        });
    }

    function exitQuiz() {
        if(confirm("ต้องการออกจากห้องสอบหรือไม่? ข้อมูลการทำข้อสอบจะไม่ถูกบันทึก")) {
            // ในสภาพแวดล้อมจริงอาจจะ redirect ไปหน้าอื่น
            window.location.reload(); // รีโหลดหน้าเว็บเพื่อนับหนึ่งใหม่
        }
    }

</script>
</body>
</html>
