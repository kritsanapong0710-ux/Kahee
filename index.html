<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBuilder Pro - Ultimate Fixed Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* ระบบจัดการธีมสีและ Contrast สำหรับ Mark */
        :root {
            --primary: #22c55e;
            --bg-body: #f0fdf4;
            --text-main: #1f2937;
            --card-bg: #ffffff;
            --btn-text: #ffffff;
        }

        /* ธีมน้ำเงิน - แก้ปัญหาฟอนต์ดำอ่านยาก (ใช้ตัวหนังสือขาวแทน) */
        body.theme-blue {
            --primary: #2563eb;
            --bg-body: #eff6ff;
            --text-main: #ffffff; 
            --card-bg: #1e3a8a;
            --btn-text: #ffffff;
        }

        /* ธีมมืด */
        body.theme-dark {
            --primary: #10b981;
            --bg-body: #0f172a;
            --text-main: #f8fafc;
            --card-bg: #1e293b;
            --btn-text: #ffffff;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .app-card { background-color: var(--card-bg); border-radius: 2.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        
        .btn-p { 
            background-color: var(--primary); 
            color: var(--btn-text); 
            transition: 0.3s; 
            border-radius: 1.2rem;
            font-weight: 700;
        }
        
        .btn-p:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .tab-btn { color: #9ca3af; font-weight: 700; transition: 0.3s; }
        .tab-active { 
            background-color: var(--primary); 
            color: var(--btn-text) !important; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* แก้ไข Text ในธีมน้ำเงินให้มองเห็นชัด */
        body.theme-blue p, body.theme-blue h2, body.theme-blue h3 { color: white; }
        body.theme-blue .text-gray-400 { color: #bfdbfe; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <main class="max-w-6xl mx-auto p-4 mt-8">

                    <button onclick="saveAdminConfigs()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-2xl hover:bg-black transition-all">บันทึกการตั้งค่าแอดมิน</button>

    <div id="authModal" class="fixed inset-0 bg-black/70 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-md">

            <div class="space-y-4">

                <div class="flex items-center gap-3 py-4">

                <div class="space-y-3">

                    <input type="password" id="pass" placeholder="Password" class="w-full p-5 bg-gray-50 border-none rounded-2xl outline-none font-bold dark:bg-gray-700">
                </div>
                
                <div id="loginMode">
                    <button onclick="handleAuth('login')" class="btn-p w-full py-5 rounded-3xl font-black text-lg shadow-2xl mb-6">LOG IN</button>
                    <p class="text-center text-xs text-gray-400 font-bold">ยังไม่มีบัญชีใช่ไหม? <a href="javascript:switchAuth('sign')" class="text-green-500 underline uppercase ml-1">สมัครสมาชิก</a></p>
                </div>
                <div id="signMode" class="hidden">
                    <button onclick="handleAuth('sign')" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-2xl mb-6 hover:bg-blue-700">CREATE ACCOUNT</button>
                    <p class="text-center text-xs text-gray-400 font-bold">มีบัญชีอยู่แล้ว? <a href="javascript:switchAuth('login')" class="text-blue-500 underline uppercase ml-1">เข้าสู่ระบบ</a></p>
                </div>
            </div>
            <button onclick="closeAuth()" class="w-full mt-10 text-gray-300 text-[10px] font-black uppercase tracking-[0.3em] hover:text-gray-500">ยกเลิก</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE INIT (YOUR CONFIG)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c",
            measurementId: "G-GDYRJDMZCV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const ADMIN_MARK = "Kritsanapong0710@gmail.com";
        const DEF_KEY = "AIzaSyCu8V3wiyBXqMPKew8B97tP0cD7D2ra1uw";

        let currentU = null;
        let isA = false;

        // ==========================================
        // 2. AUTHENTICATION LOGIC
        // ==========================================
        auth.onAuthStateChanged(function(user) {
            currentU = user;
            const area = document.getElementById('authArea');
            if (user) {
                isA = (user.email && user.email.toLowerCase() === ADMIN_MARK.toLowerCase()) || (user.phoneNumber === '+66967358298');
                
                const photo = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=22c55e&color=fff';
                area.innerHTML = `
                    <div class="flex items-center gap-3 bg-white p-1.5 pr-4 rounded-full border border-gray-100 shadow-sm animate__animated animate__fadeInRight dark:bg-gray-700">
                        <img src="${photo}" class="w-10 h-10 rounded-full border-2 border-primary shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black max-w-[80px] truncate leading-tight">${user.displayName || 'Mark Student'}</span>
                            <span class="text-[8px] font-bold text-primary uppercase">${isA ? '👑 Admin' : 'Official Member'}</span>
                        </div>
                        <button onclick="auth.signOut()" class="text-red-300 hover:text-red-500 ml-1 transition-colors"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                `;
                if(isA) document.getElementById('adminZone').classList.remove('hidden');
                closeAuth();
                fetchExams();
            } else {
                area.innerHTML = `<button onclick="openAuth('login')" class="btn-p px-8 py-3 text-sm shadow-xl">LOGIN</button>`;
                document.getElementById('adminZone').classList.add('hidden');
                isA = false;
                fetchExams();
            }
        });

        function openAuth(m) { document.getElementById('authModal').classList.remove('hidden'); switchAuth(m); }
        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuth(m) {
            document.getElementById('loginMode').classList.toggle('hidden', m==='sign');
            document.getElementById('signMode').classList.toggle('hidden', m==='login');
            document.getElementById('authTitle').innerText = (m==='login') ? "WELCOME BACK" : "JOIN THE TEAM";
        }

        async function authSocial(prov) {
            const p = (prov === 'google') ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try { await auth.signInWithPopup(p); confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function handleAuth(mode) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("กรอกข้อมูลให้ครบครับ");
            try {
                if(mode === 'sign') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await res.user.sendEmailVerification();
                    alert("สมัครสำเร็จ! โปรดตรวจสอบอีเมลเพื่อยืนยันตัวตนนะครับ");
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch (x) { alert(x.message); }
        }

        // ==========================================
        // 3. AI SYSTEM (SMART AUTO-FALLBACK)
        // ==========================================
        function getAiKey() { return localStorage.getItem('mk_final_k') || DEF_KEY; }

        async function callAI(promptText) {
            const key = getAiKey();
            const persona = localStorage.getItem('mk_final_p') || "คุณเป็นติวเตอร์อัจฉริยะ";
            const requestBody = { contents: [{ parts: [{ text: `[SYSTEM: ${persona}]\n\n${promptText}` }] }] };

            // 🔴 ระบบสุ่มยิงแบบ Fallback เพื่อกันบัค Endpoint 🔴
            const options = [
                { url: `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}` },
                { url: `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}` },
                { url: `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}` }
            ];

            let lastError = "";
            for (let opt of options) {
                try {
                    const response = await fetch(opt.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });
                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    } else if (data.error) {
                        lastError = data.error.message;
                        console.warn("AI Path Failed:", lastError);
                    }
                } catch (err) {
                    lastError = err.message;
                }
            }
            throw new Error(`AI ขัดข้อง: ${lastError} (กรุณาเช็ค API Key ของแอดมิน Mark ในเมนูตั้งค่าครับ)`);
        }

        async function generateWithAI() {
            const topic = document.getElementById('aiTopic').value;
            if(!topic) return alert("ระบุหัวข้อที่ต้องการติวครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-sync fa-spin mr-2"></i> AI กำลังวิเคราะห์ข้อมูล...`;
            btn.disabled = true;

            try {
                const prompt = `จงสร้างข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น ห้ามพิมพ์อย่างอื่น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`;
                const result = await callAI(prompt);
                document.getElementById('bulkInput').value = result;
                document.getElementById('saveTitle').value = topic;
                switchTab('import');
                processRawToEditor();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> สร้างข้อสอบทันที`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatIn');
            const box = document.getElementById('chatBox');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = '';

            box.innerHTML += `<div class="self-end bg-primary text-white p-4 rounded-[1.5rem] rounded-tr-none max-w-[85%] text-sm ml-auto animate__animated animate__fadeInRight shadow-lg font-bold">${msg}</div>`;
            box.scrollTop = box.scrollHeight;

            const lid = "l-" + Date.now();
            box.innerHTML += `<div id="${lid}" class="text-[10px] font-black opacity-30 animate-pulse uppercase ml-2">AI กำลังคิดคำตอบ...</div>`;

            try {
                const aiMsg = await callAI(msg);
                document.getElementById(lid).remove();
                
                const aiName = localStorage.getItem('mk_final_n') || "AI Tutor";
                const aiImg = localStorage.getItem('mk_final_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";

                box.innerHTML += `
                    <div class="flex items-start gap-3 animate__animated animate__fadeInLeft">
                        <img src="${aiImg}" class="w-10 h-10 rounded-2xl border-2 border-primary shadow-sm">
                        <div class="bg-white text-gray-700 p-5 rounded-[1.5rem] rounded-tl-none shadow-sm border border-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                            <p class="text-[10px] font-black text-blue-500 mb-2 uppercase tracking-widest">${aiName}</p>
                            ${aiMsg.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lid).innerText = "ERROR: " + e.message; }
        }

        // ==========================================
        // 4. DATABASE & PARSER
        // ==========================================
        function processRawToEditor() {
            const text = document.getElementById('bulkInput').value;
            const list = document.getElementById('qList');
            list.innerHTML = '';
            
            const rawQs = text.split('question*(').filter(function(q) { return q.trim() !== ''; });
            rawQs.forEach(function(qB, i) {
                const parts = qB.split(')');
                if(parts.length < 2) return;
                const qT = parts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                
                while((m = re.exec(parts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border border-gray-100 rounded-2xl hover:border-primary/40 transition-all dark:bg-gray-700">
                            <input type="radio" name="r_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500 cursor-pointer">
                            <span class="font-black text-gray-400 uppercase w-8 text-center">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="flex-1 bg-transparent outline-none font-bold text-sm dark:text-white q-opt-val">
                        </div>
                    `;
                }

                list.innerHTML += `
                    <div class="exam-card app-card p-8 md:p-10 relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-8 right-8 text-gray-200 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can text-xl"></i></button>
                        <div class="mb-6"><span class="bg-gray-900 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-tighter shadow-xl">ข้อที่ ${i+1}</span></div>
                        <textarea class="w-full bg-transparent font-black text-2xl border-b-2 border-gray-50 pb-4 outline-none focus:border-primary transition-colors dark:text-white q-text-val">${qT}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">${oH}</div>
                    </div>
                `;
            });
            document.getElementById('editorView').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('editorView').offsetTop - 50, behavior: 'smooth' });
        }

        async function saveFinalToFirebase() {
            if(!currentU) return alert("กรุณาล็อกอินก่อนครับ!");
            const title = document.getElementById('saveTitle').value || "ชุดข้อสอบใหม่";
            const cards = document.querySelectorAll('.exam-card');
            
            const data = {
                title: title, uid: currentU.uid, owner: currentU.displayName || currentU.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };

            cards.forEach(function(b) {
                const opts = [];
                b.querySelectorAll('.flex.items-center').forEach(function(o) {
                    opts.push({ text: o.querySelector('.q-opt-val').value, isCorrect: o.querySelector('input[type="radio"]').checked });
                });
                data.questions.push({ q: b.querySelector('.q-text-val').value, options: opts });
            });

            try {
                await db.collection('exams').add(data);
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                alert("บันทึกสำเร็จเรียบร้อยครับ!");
                switchTab('db');
            } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse"><i class="fa-solid fa-cloud-arrow-down text-4xl mb-4 text-primary"></i><br>กำลังดึงข้อมูลฐานข้อมูล...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(function(d) {
                    const x = d.data();
                    const mine = currentU && x.uid === currentU.uid;
                    if(isA || mine || x.visibility === 'public') {
                        const date = x.createdAt ? x.createdAt.toDate().toLocaleDateString('th-TH') : '-';
                        grid.innerHTML += `
                            <div class="app-card p-8 border border-gray-50 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isA || mine) ? `<button onclick="deleteExam('${d.id}')" class="absolute top-6 right-6 text-gray-200 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-tighter border ${x.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${x.visibility}</span>
                                    <h3 class="font-black text-xl leading-tight mt-6 mb-2 dark:text-white">${x.title}</h3>
                                    <p class="text-[10px] font-bold text-gray-400 mb-8 uppercase tracking-widest">สร้างโดย: ${x.owner} • ${date}</p>
                                </div>
                                <button onclick="alert('เปิดดูฟีเจอร์นี้เร็วๆ นี้')" class="w-full py-4 bg-gray-50 border border-gray-100 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 hover:bg-primary hover:text-white transition-all dark:bg-gray-700">Open Exam (${x.questions.length})</button>
                                ${isA ? `<button onclick="togglePub('${d.id}','${x.visibility}')" class="w-full py-2 mt-2 text-[9px] font-bold text-blue-500 underline uppercase tracking-widest">สลับโหมดสาธารณะ</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = '<p class="col-span-full text-center text-red-400">Database Error: '+e.message+'</p>'; }
        }

        async function togglePub(id, c) {
            await db.collection('exams').doc(id).update({ visibility: (c==='public'?'private':'public') });
            fetchExams();
        }

        async function deleteExam(id) {
            if(confirm("ลบถาวร? (เฉพาะ Mark)")) { await db.collection('exams').doc(id).delete(); fetchExams(); }
        }

        // ==========================================
        // 5. SETTINGS & UI CONTROLS
        // ==========================================
        function toggleSettings() { document.getElementById('sideSettings').classList.toggle('translate-x-full'); }
        
        function setTheme(t) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(t !== 'green') document.body.classList.add('theme-' + t);
            localStorage.setItem('mk_final_t', t);
        }

        function switchTab(t) {
            ['db','import','ai','chat'].forEach(function(x) {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('tab-active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
            document.getElementById('editorView').classList.add('hidden');
            if(t==='db') fetchExams();
        }

        function saveAdminConfigs() {
            if(!isA) return;
            localStorage.setItem('mk_final_k', document.getElementById('adm-key').value);
            localStorage.setItem('mk_final_n', document.getElementById('adm-name').value);
            localStorage.setItem('mk_final_i', document.getElementById('adm-img').value);
            localStorage.setItem('mk_final_p', document.getElementById('adm-persona').value);
            applyAIProfile();
            alert("บันทึกการตั้งค่า Admin Mark สำเร็จ!");
        }

        function applyAIProfile() {
            const n = localStorage.getItem('mk_final_n') || "AI Smart Assistant";
            const i = localStorage.getItem('mk_final_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-name-chat').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            document.getElementById('ai-img-chat').src = i;
            
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getAiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_final_p') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_final_t')) setTheme(localStorage.getItem('mk_final_t'));
            applyAIProfile();
            switchTab('db');
        };
    </script>
</body>
