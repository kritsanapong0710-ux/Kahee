<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBuilder Pro - Mark Masterpiece</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        /* ระบบจัดการตัวแปรสี - แก้ปัญหา Contrast สำหรับ Mark */
        :root {
            --primary: #22c55e;
            --bg-site: #f8fafc;
            --txt-main: #1e293b;
            --card-bg: #ffffff;
        }

        /* ธีมน้ำเงิน - ปรับให้อ่านง่ายขึ้น (ตัวหนังสือขาว) */
        body.theme-blue {
            --primary: #2563eb;
            --bg-site: #0f172a;
            --txt-main: #f8fafc; 
            --card-bg: #1e293b;
        }

        /* ธีมมืด */
        body.theme-dark {
            --primary: #10b981;
            --bg-site: #020617;
            --txt-main: #f1f5f9;
            --card-bg: #0f172a;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-site); 
            color: var(--txt-main);
            transition: all 0.4s ease; 
        }

        .app-card { background-color: var(--card-bg); border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05); }
        .btn-p { background-color: var(--primary); color: white; border-radius: 1rem; font-weight: 700; transition: 0.3s; }
        .btn-p:hover { transform: translateY(-2px); filter: brightness(110%); }

        /* Mobile Tab Scroll (แก้ปัญหาบีบแน่น) */
        .tab-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 5px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tab-scroller::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            flex: 0 0 auto; /* ป้องกันปุ่มหดตัว */
            padding: 12px 20px;
            border-radius: 1.25rem;
            font-weight: 700;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white !important;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .input-style {
            background-color: rgba(148, 163, 184, 0.1);
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 12px;
            width: 100%;
            outline: none;
            color: var(--txt-main);
            transition: 0.3s;
        }
        .input-style:focus { border-color: var(--primary); background: var(--card-bg); }
        
        /* แก้ปุ่ม Login ที่ Navbar */
        #navAuthBtn { display: flex; align-items: center; }

        /* Loading Dots */
        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary); color: var(--primary); animation: dot-flashing 1s infinite linear alternate; animation-delay: .5s; }
        @keyframes dot-flashing { 0% { background-color: var(--primary); } 50%, 100% { background-color: rgba(34, 197, 94, 0.2); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] bg-white/80 backdrop-blur-xl border-b border-gray-100 px-4 py-3 md:px-8 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-green-500 w-10 h-10 flex items-center justify-center rounded-xl text-white shadow-lg"><i class="fa-solid fa-graduation-cap"></i></div>
                <h1 class="text-xl font-black tracking-tighter uppercase">QUIZ<span class="text-green-500">PRO</span></h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="navAuthBtn">
                    <button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-xl font-bold text-xs hover:bg-green-500 hover:text-white transition-all">LOGIN</button>
                </div>
                <button onclick="toggleSidebar()" class="text-gray-400 p-2 text-xl"><i class="fa-solid fa-bars-staggered"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        
        <div class="tab-scroller mb-8 bg-gray-100/50 p-1.5 rounded-[1.5rem] dark:bg-gray-800">
            <button onclick="switchTab('db')" id="btn-db" class="tab-btn active"><i class="fa-solid fa-database mr-2"></i> คลังข้อสอบ</button>
            <button onclick="switchTab('import')" id="btn-import" class="tab-btn"><i class="fa-solid fa-paste mr-2"></i> วางโจทย์ดิบ</button>
            <button onclick="switchTab('ai')" id="btn-ai" class="tab-btn"><i class="fa-solid fa-robot mr-2"></i> AI เจนโจทย์</button>
            <button onclick="switchTab('chat')" id="btn-chat" class="tab-btn"><i class="fa-solid fa-comments mr-2"></i> ติวกับ AI</button>
        </div>

        <div id="view-db" class="animate__animated animate__fadeIn">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-black italic">LIBRARY</h2>
                <button onclick="fetchExams()" class="text-green-500 font-bold"><i class="fa-solid fa-sync"></i></button>
            </div>
            <div id="examsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="view-import" class="hidden app-card p-6 md:p-10 animate__animated animate__fadeIn">
            <h3 class="font-bold mb-4">Paste Raw Exam Text</h3>
            <textarea id="bulkInput" class="input-style h-64 md:h-80 resize-none font-medium dark:bg-gray-900" placeholder="question*(ข้อใดคือ...) *a(...)correct *b(...)nope"></textarea>
            <div class="mt-4 flex justify-end">
                <button onclick="parseRawText()" class="btn-p px-10 py-3 shadow-xl">ประมวลผล</button>
            </div>
        </div>

        <div id="view-ai" class="hidden app-card p-8 md:p-12 animate__animated animate__fadeIn text-center">
            <div class="w-24 h-24 rounded-[2rem] mx-auto mb-6 shadow-2xl overflow-hidden border-4 border-white">
                <img id="ai-img-gen" src="https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff" class="w-full h-full object-cover">
            </div>
            <h2 id="ai-name-gen" class="text-2xl font-black mb-4">AI Smart Assistant</h2>
            <div class="max-w-md mx-auto space-y-4">
                <input type="text" id="aiTopicInp" placeholder="ระบุหัวข้อที่จะสอบ..." class="input-style text-center font-bold text-lg dark:bg-gray-900">
                <button onclick="generateExamWithAI()" id="aiGenBtn" class="btn-p w-full py-4 shadow-xl flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-sparkles"></i> สั่งให้ AI เริ่มสร้าง
                </button>
            </div>
        </div>

        <div id="view-chat" class="hidden app-card p-4 md:p-6 animate__animated animate__fadeIn flex flex-col h-[550px] md:h-[650px]">
            <div id="chatMessages" class="flex-1 overflow-y-auto space-y-4 p-2 custom-scroll"></div>
            <div class="mt-4 flex gap-2">
                <input type="text" id="chatInp" class="input-style flex-1" placeholder="ถาม AI..." onkeypress="if(event.key=='Enter')sendChat()">
                <button onclick="sendChat()" class="btn-p w-12 h-12 flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="view-editor" class="hidden mt-8 pb-32">
            <div id="editorContent" class="space-y-4"></div>
            <div class="fixed bottom-6 left-4 right-4 max-w-2xl mx-auto bg-white/90 backdrop-blur-md p-4 rounded-3xl shadow-2xl border flex flex-col md:flex-row gap-2 z-40 dark:bg-gray-800">
                <input type="text" id="finalTitle" placeholder="ชื่อวิชา/ชุดข้อสอบ" class="input-style flex-1 font-bold text-center">
                <button onclick="saveExamToFirebase()" class="btn-p px-10 py-3">บันทึกคลัง</button>
            </div>
        </div>

    </main>

    <div id="sidePanel" class="fixed right-0 top-0 h-full w-full sm:w-80 bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[100] border-l dark:bg-gray-900">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="font-black text-lg">SETTINGS</h3>
            <button onclick="toggleSidebar()" class="text-2xl">&times;</button>
        </div>
        <div class="p-6 space-y-10 overflow-y-auto h-[85%]">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-4 uppercase">App Themes</label>
                <div class="flex gap-4">
                    <button onclick="setTheme('green')" class="w-10 h-10 rounded-full bg-green-500 border-2 border-white shadow-lg"></button>
                    <button onclick="setTheme('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-2 border-white shadow-lg"></button>
                    <button onclick="setTheme('dark')" class="w-10 h-10 rounded-full bg-gray-800 border-2 border-white shadow-lg"></button>
                </div>
            </div>

            <div id="adminPanel" class="hidden bg-red-50 p-5 rounded-3xl border border-red-100 dark:bg-red-900/10">
                <h4 class="font-black text-red-600 text-xs mb-4 uppercase tracking-widest border-b pb-2">Admin Mark Control</h4>
                <div class="space-y-3">
                    <input type="password" id="adm-key" placeholder="Paste Gemini Key Here" class="input-style text-xs font-mono py-2.5">
                    <input type="text" id="adm-name" placeholder="AI Name" class="input-style text-xs py-2.5">
                    <input type="text" id="adm-img" placeholder="AI Avatar URL" class="input-style text-xs py-2.5">
                    <textarea id="adm-persona" placeholder="System Persona" class="input-style text-xs h-20"></textarea>
                    <button onclick="saveAdminSettings()" class="w-full bg-gray-800 text-white py-2.5 rounded-xl text-xs font-bold">บันทึก Admin</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authModalTitle" class="text-2xl font-black text-center mb-8">QUIZ MASTER</h3>
            <div class="space-y-4">
                <button onclick="socialAuth('google')" class="w-full bg-white border py-3.5 rounded-2xl font-bold flex justify-center gap-3 shadow-sm dark:bg-gray-700">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Google
                </button>
                <div class="flex items-center gap-2 text-[10px] text-gray-300 font-bold uppercase"><hr class="flex-1"><span>OR</span><hr class="flex-1"></div>
                <input type="email" id="emailInp" placeholder="Email" class="input-style">
                <input type="password" id="passInp" placeholder="Password" class="input-style">
                
                <div id="loginGroup">
                    <button onclick="handleEmailAuth('login')" class="btn-p w-full py-4 shadow-xl">LOG IN</button>
                    <p class="text-center text-[10px] mt-4 font-bold">No account? <a href="javascript:switchAuth('sign')" class="text-green-500 underline uppercase">Sign Up</a></p>
                </div>
                <div id="signGroup" class="hidden">
                    <button onclick="handleEmailAuth('sign')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl">CREATE ACCOUNT</button>
                    <p class="text-center text-[10px] mt-4 font-bold">Have account? <a href="javascript:switchAuth('login')" class="text-blue-500 underline uppercase">Log In</a></p>
                </div>
            </div>
            <button onclick="closeAuthModal()" class="w-full mt-8 text-gray-300 text-[10px] font-bold uppercase hover:text-gray-500">Cancel</button>
        </div>
    </div>

    <script>
        // 1. Initial Setup
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_E = "Kritsanapong0710@gmail.com";

        let userC = null;
        let isA = false;

        // 2. Auth States
        auth.onAuthStateChanged(function(user) {
            userC = user;
            const btnArea = document.getElementById('navAuthBtn');
            if (user) {
                isA = (user.email && user.email.toLowerCase() === ADMIN_E.toLowerCase()) || (user.phoneNumber === '+66967358298');
                const pic = user.photoURL || 'https://ui-avatars.com/api/?name=User';
                btnArea.innerHTML = `
                    <div class="flex items-center gap-2 bg-gray-50 p-1 pr-3 rounded-full border dark:bg-gray-800">
                        <img src="${pic}" class="w-8 h-8 rounded-full border border-white">
                        <span class="text-[10px] font-black max-w-[60px] truncate">${user.displayName || 'Mark'}</span>
                        <button onclick="auth.signOut()" class="text-red-400 ml-1"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                `;
                if(isA) document.getElementById('adminPanel').classList.remove('hidden');
                closeAuthModal();
                fetchExams();
            } else {
                btnArea.innerHTML = `<button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-5 py-2 rounded-xl font-bold text-xs hover:bg-green-500 hover:text-white transition-all shadow-sm">LOGIN</button>`;
                document.getElementById('adminPanel').classList.add('hidden');
                isA = false;
                fetchExams();
            }
        });

        function openAuthModal(m) { document.getElementById('authModal').classList.remove('hidden'); switchAuth(m); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuth(m) {
            document.getElementById('loginGroup').classList.toggle('hidden', m==='sign');
            document.getElementById('signGroup').classList.toggle('hidden', m==='login');
            document.getElementById('authModalTitle').innerText = (m==='login') ? "WELCOME BACK" : "JOIN THE TEAM";
        }

        async function socialAuth(p) {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function handleEmailAuth(mode) {
            const e = document.getElementById('emailInp').value;
            const p = document.getElementById('passInp').value;
            try {
                if(mode==='sign') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await res.user.sendEmailVerification();
                    alert("สมัครสำเร็จ! โปรดเช็คอีเมลเพื่อยืนยันตัวตนนะครับ");
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch (x) { alert(x.message); }
        }

        // 3. AI Logic (The Ultimate Brute Force Fix 2.0)
        function getAiKey() { return localStorage.getItem('mk_v4_key') || ""; }

        async function callGemini(promptText) {
            const key = getAiKey();
            if(!key) throw new Error("Mark ครับ! ลืมแปะ API Key หรือเปล่า? (ล็อกอินแอดมินแล้วกดฟันเฟืองด้านบนนะครับ)");
            
            const persona = localStorage.getItem('mk_v4_p') || "คุณเป็นติวเตอร์อัจฉริยะ";
            const reqBody = { contents: [{ parts: [{ text: `[System Personality: ${persona}]\n\n${promptText}` }] }] };

            // 🛑 กลยุทธ์รัวยิง: ลองทุก Endpoint จนกว่า Google จะยอม 🛑
            const versions = ['v1', 'v1beta'];
            const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
            
            let lastError = "";

            for (let v of versions) {
                for (let m of models) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${v}/models/${m}:generateContent?key=${key}`;
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(reqBody)
                        });
                        const data = await res.json();
                        
                        if (data.candidates && data.candidates[0].content) {
                            console.log(`✅ AI Success with ${v}/${m}`);
                            return data.candidates[0].content.parts[0].text;
                        } else if (data.error) {
                            lastError = `${data.error.message} (${v}/${m})`;
                        }
                    } catch (e) { lastError = e.message; }
                }
            }
            throw new Error(`AI ล้มเหลว: ${lastError}\n(แนะนำ: Mark ลองกดสร้าง API Key ใหม่ใน AI Studio ดูนะครับ)`);
        }

        async function generateExamWithAI() {
            const topic = document.getElementById('aiTopicInp').value;
            if(!topic) return alert("ระบุเรื่องที่อยากออกสอบด้วยครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังเสกโจทย์...`;
            btn.disabled = true;

            try {
                const res = await callGemini(`จงสร้างข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น ห้ามพิมพ์ประโยคอื่น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`);
                document.getElementById('bulkInput').value = res;
                document.getElementById('finalTitle').value = topic;
                switchTab('import');
                parseRawText();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> สั่งให้ AI เริ่มสร้าง`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const inp = document.getElementById('chatInp');
            const box = document.getElementById('chatMessages');
            if(!inp.value) return;
            const msg = inp.value; inp.value = '';

            box.innerHTML += `<div class="flex justify-end"><div class="bg-primary text-white p-4 rounded-3xl rounded-tr-none max-w-[85%] text-sm font-bold shadow-lg animate__animated animate__fadeInRight">${msg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const lId = "l-" + Date.now();
            box.innerHTML += `<div id="${lId}" class="flex gap-1 p-2"><div class="dot-flashing"></div></div>`;

            try {
                const res = await callGemini(msg);
                document.getElementById(lId).remove();
                const aiN = localStorage.getItem('mk_v4_n') || "AI Assistant";
                const aiI = localStorage.getItem('mk_v4_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${aiI}" class="w-10 h-10 rounded-2xl border-2 border-primary shadow-md object-cover">
                        <div class="bg-white text-gray-700 p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed border dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                            <p class="text-[10px] font-black text-blue-500 mb-1 uppercase">${aiN}</p>
                            ${res.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lId).innerText = "❌ ERROR: " + e.message; }
        }

        // 4. Parser & Database
        function parseRawText() {
            const raw = document.getElementById('bulkInput').value;
            const container = document.getElementById('editorContent'); container.innerHTML = '';
            const blocks = raw.split('question*(').filter(q => q.trim() !== '');
            
            blocks.forEach((b, i) => {
                const pts = b.split(')'); if(pts.length < 2) return;
                const qT = pts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                while((m = re.exec(pts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border rounded-2xl hover:border-primary/40 dark:bg-gray-700">
                            <input type="radio" name="g_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500 cursor-pointer">
                            <span class="font-black text-gray-400 uppercase w-6 text-center text-sm">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="val-opt flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }
                container.innerHTML += `
                    <div class="q-card app-card p-6 md:p-10 relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-6 right-6 text-gray-200 hover:text-red-500"><i class="fa-solid fa-trash-can text-xl"></i></button>
                        <div class="mb-6"><span class="bg-gray-900 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase shadow-lg">โจทย์ข้อที่ ${i+1}</span></div>
                        <textarea class="val-q w-full bg-transparent font-black text-2xl border-b-2 border-gray-100 pb-4 outline-none focus:border-primary transition-all dark:text-white">${qT}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">${oH}</div>
                    </div>
                `;
            });
            document.getElementById('view-editor').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('view-editor').offsetTop - 50, behavior: 'smooth' });
        }

        async function saveExamToFirebase() {
            if(!userC) return alert("ล็อกอินก่อนนะครับ!");
            const data = {
                title: document.getElementById('finalTitle').value || "ชุดข้อสอบใหม่",
                uid: userC.uid, owner: userC.displayName || userC.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };
            document.querySelectorAll('.q-card').forEach(c => {
                const opts = [];
                c.querySelectorAll('.flex.items-center').forEach(r => {
                    opts.push({ text: r.querySelector('.val-opt').value, isCorrect: r.querySelector('input[type="radio"]').checked });
                });
                data.questions.push({ q: c.querySelector('.val-q').value, options: opts });
            });
            try {
                await db.collection('exams').add(data);
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                alert("บันทึกสำเร็จ!"); switchTab('db');
            } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse">กำลังโหลดข้อมูล...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const x = doc.data();
                    const isM = userC && x.uid === userC.uid;
                    if(isA || isM || x.visibility === 'public') {
                        const dStr = x.createdAt ? x.createdAt.toDate().toLocaleDateString('th-TH') : '-';
                        grid.innerHTML += `
                            <div class="app-card p-6 border border-gray-50 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isA || isM) ? `<button onclick="deleteExam('${doc.id}')" class="absolute top-4 right-4 text-red-100 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase border ${x.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${x.visibility}</span>
                                    <h3 class="font-black text-xl mt-4 mb-2 dark:text-white line-clamp-2">${x.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">โดย: ${x.owner} • ${dStr}</p>
                                </div>
                                <button onclick="alert('เร็วๆ นี้')" class="w-full py-4 bg-gray-50 border rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-primary hover:text-white transition-all dark:bg-gray-700">Open Exam (${x.questions.length} ข้อ)</button>
                                ${isA ? `<button onclick="togglePub('${doc.id}','${x.visibility}')" class="w-full py-2 mt-2 text-[9px] font-black text-blue-500 underline uppercase tracking-widest border border-blue-50 rounded-xl hover:bg-blue-50">สลับสถานะ</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'Error loading: ' + e.message; }
        }

        async function togglePub(id, c) {
            await db.collection('exams').doc(id).update({ visibility: (c==='public'?'private':'public') });
            fetchExams();
        }
        async function deleteExam(id) {
            if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExams(); }
        }

        // 5. UI Controls
        function toggleSidebar() { document.getElementById('sidePanel').classList.toggle('translate-x-full'); }
        function setTheme(t) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(t !== 'green') document.body.classList.add('theme-' + t);
            localStorage.setItem('mk_v4_theme', t);
        }
        function switchTab(t) {
            ['db','import','ai','chat'].forEach(x => {
                document.getElementById('view-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active');
            });
            document.getElementById('view-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
            document.getElementById('view-editor').classList.add('hidden');
            if(t==='db') fetchExams();
        }

        function saveAdminSettings() {
            if(!isA) return;
            localStorage.setItem('mk_v4_key', document.getElementById('adm-key').value);
            localStorage.setItem('mk_v4_n', document.getElementById('adm-name').value);
            localStorage.setItem('mk_v4_i', document.getElementById('adm-img').value);
            localStorage.setItem('mk_v4_p', document.getElementById('adm-persona').value);
            loadAI(); alert("บันทึก Admin สำเร็จ!");
        }

        function loadAI() {
            const n = localStorage.getItem('mk_v4_n') || "AI Smart Assistant";
            const i = localStorage.getItem('mk_v4_i') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-name-chat').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            document.getElementById('ai-img-chat').src = i;
            
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getAiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_v4_p') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_v4_theme')) setTheme(localStorage.getItem('mk_v4_theme'));
            loadAI(); switchTab('db');
        };
    </script>
</body>
</html>
