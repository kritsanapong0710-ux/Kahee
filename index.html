<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuizBuilder PRO - Final Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        /* 🎨 Master Color Variables */
        :root {
            --primary: #22c55e;
            --bg-site: #f8fafc;
            --txt-main: #1e293b;
            --card-bg: #ffffff;
            --input-bg: #f1f5f9;
        }

        /* ธีมน้ำเงินแบบพรีเมียม (Contrast สูงสุดเพื่อ Mark) */
        body.theme-blue {
            --primary: #3b82f6;
            --bg-site: #020617; /* พื้นหลังเข้มมาก */
            --txt-main: #ffffff; /* ตัวหนังสือขาวจั๊วะ */
            --card-bg: #0f172a; /* การ์ดน้ำเงินเข้ม */
            --input-bg: #1e293b;
        }

        body.theme-dark {
            --primary: #10b981;
            --bg-site: #000000;
            --txt-main: #f1f5f9;
            --card-bg: #111827;
            --input-bg: #1f2937;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-site); 
            color: var(--txt-main);
            transition: all 0.4s ease; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 📱 Layout & Components */
        .app-card { 
            background-color: var(--card-bg); 
            border-radius: 2rem; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.25rem;
        }

        .btn-glow {
            background-color: var(--primary);
            color: white;
            border-radius: 1.1rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none;
        }
        .btn-glow:hover { filter: brightness(115%); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Mobile Tab Scroll (ลื่นไหลไม่เบียด) */
        .tab-bar {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            scrollbar-width: none;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 1.5rem;
            -ms-overflow-style: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        
        .tab-item {
            flex: 0 0 auto;
            padding: 12px 22px;
            border-radius: 1.1rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: #94a3b8;
            transition: 0.3s;
        }
        .tab-item.active {
            background-color: var(--primary);
            color: white !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .custom-input {
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 1.1rem;
            padding: 14px;
            width: 100%;
            outline: none;
            color: inherit;
            transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--primary); background-color: var(--card-bg); }

        /* Animation */
        .fade-up { animation: fadeInUp 0.5s ease both; }
        @keyframes fadeInUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary); animation: dot-flashing 1s infinite linear alternate; }
        @keyframes dot-flashing { 0% { background-color: var(--primary); } 50%, 100% { background-color: rgba(34, 197, 94, 0.2); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] bg-white/70 backdrop-blur-xl border-b border-gray-100 px-4 py-4 md:px-10 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-primary w-11 h-11 flex items-center justify-center rounded-2xl text-white bg-green-500 shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase">QUIZ<span class="text-green-500">PRO</span></h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="navUserSlot">
                    <button onclick="openAuthModal()" class="bg-gray-100 text-gray-700 px-5 py-2.5 rounded-xl font-black text-[10px] hover:bg-green-500 hover:text-white transition-all shadow-sm">LOGIN</button>
                </div>

    <main class="max-w-6xl mx-auto px-4 md:px-8 mt-6">
        
        <div class="tab-bar mb-8 dark:bg-gray-800">
            <button onclick="switchView('db')" id="btn-db" class="tab-item active"><i class="fa-solid fa-database mr-2"></i> คลังข้อสอบ</button>
            <button onclick="switchView('import')" id="btn-import" class="tab-item"><i class="fa-solid fa-file-import mr-2"></i> วางโจทย์</button>
            <button onclick="switchView('ai')" id="btn-ai" class="tab-item"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i> AI เจนโจทย์</button>
            <button onclick="switchView('chat')" id="btn-chat" class="tab-item"><i class="fa-solid fa-comments mr-2"></i> ติวกับ AI</button>

        <div id="view-db" class="fade-up">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black italic">LIBRARY</h2>
                <button onclick="fetchExams()" class="text-green-500 font-bold bg-green-50 px-4 py-2 rounded-xl"><i class="fa-solid fa-rotate mr-1"></i> รีเฟรช</button>
            </div>
            <div id="examsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div id="view-import" class="hidden app-card fade-up">

            <div class="mt-4 flex justify-end">

        <div id="view-ai" class="hidden app-card text-center fade-up py-10 md:py-20">

            <p class="opacity-50 mb-10 text-sm">ระบุหัวข้อที่คุณต้องการ แล้ว AI จะวิเคราะห์และสร้างให้ครับ</p>
            <div class="max-w-xl mx-auto space-y-4">

                <button onclick="generateWithAI()" id="aiGenBtn" class="btn-glow w-full py-5 shadow-xl text-lg"><i class="fa-solid fa-sparkles"></i> เริ่มออกข้อสอบ</button>

        <div id="view-chat" class="hidden app-card flex flex-col h-[65vh] md:h-[75vh] fade-up">

            </div>
            <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scroll"></div>

                <div class="flex gap-2">
                    <input type="text" id="chatIn" class="custom-input flex-1" placeholder="คุยกับ AI / ช่วยเขียน Prompt..." onkeypress="if(event.key=='Enter')sendChat()">
                    <button onclick="sendChat()" class="btn-glow w-14 h-14 shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </div>

        </div>

        <div id="view-editor" class="hidden mt-8 space-y-6 pb-40">

                <button onclick="saveExam()" class="btn-glow px-12 py-4 w-full md:w-auto text-lg shadow-xl">บันทึกข้อมูล</button>

    <div id="sideMenu" class="fixed right-0 top-0 h-full w-full sm:w-85 bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[100] border-l dark:bg-gray-900">
        <div class="p-8 border-b flex justify-between items-center dark:border-gray-800">
            <h3 class="font-black text-xl italic">SETTINGS</h3>
            <button onclick="toggleSidebar()" class="text-3xl text-gray-400">&times;</button>
        </div>
        <div class="p-8 space-y-10 overflow-y-auto h-[85%] no-scrollbar">

                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Themes</label>
                <div class="flex gap-4">
                    <button onclick="updateTheme('green')" class="w-12 h-12 rounded-2xl bg-green-500 border-4 border-white shadow-xl transform hover:scale-110 transition-all"></button>
                    <button onclick="updateTheme('blue')" class="w-12 h-12 rounded-2xl bg-blue-600 border-4 border-white shadow-xl transform hover:scale-110 transition-all"></button>
                    <button onclick="updateTheme('dark')" class="w-12 h-12 rounded-2xl bg-gray-900 border-4 border-white shadow-xl transform hover:scale-110 transition-all"></button>
                </div>
            </div>

            <div id="adminPanel" class="hidden space-y-6 bg-red-50 p-6 rounded-[2.5rem] border border-red-100 dark:bg-red-900/10">
                <h4 class="font-black text-red-600 text-xs uppercase tracking-widest border-b pb-4 border-red-200">Admin Control (Mark)</h4>
                <div class="space-y-4">
                    <input type="password" id="adm-key" placeholder="Gemini API Key" class="custom-input text-xs font-mono py-3 bg-white shadow-inner">
                    <input type="text" id="adm-name" placeholder="ชื่อ AI" class="custom-input text-sm py-3 bg-white">
                    <input type="text" id="adm-img" placeholder="URL รูป AI" class="custom-input text-xs py-3 bg-white">
                    <textarea id="adm-persona" placeholder="System Persona (สั่ง AI...)" class="custom-input text-xs h-24 bg-white"></textarea>
                    <button onclick="saveAdmin()" class="w-full bg-red-600 text-white py-3.5 rounded-2xl font-bold shadow-xl">บันทึก CONFIG แอดมิน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authTitle" class="text-3xl font-black italic text-center mb-10 tracking-tighter uppercase">QuizMaster</h3>
            
            <div id="authTabs" class="flex bg-gray-100 p-1.5 rounded-2xl mb-6 dark:bg-gray-700">
                <button onclick="switchAuthMode('email')" id="authTabEmail" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm">EMAIL</button>
                <button onclick="switchAuthMode('phone')" id="authTabPhone" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all text-gray-400">PHONE</button>
            </div>

            <div class="space-y-4">
                <div id="socialGroup" class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="handleSocial('google')" class="bg-white border py-3.5 rounded-2xl font-bold flex justify-center gap-2 hover:bg-gray-50 shadow-sm dark:bg-gray-700 dark:border-gray-600"><img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Google</button>
                    <button onclick="handleSocial('facebook')" class="bg-[#1877F2] text-white py-3.5 rounded-2xl font-bold flex justify-center gap-2 shadow-xl"><i class="fa-brands fa-facebook text-xl"></i> Facebook</button>
                </div>

                <div id="emailFormGroup" class="space-y-3">
                    <input type="email" id="emailInp" placeholder="Email" class="custom-input font-bold dark:bg-gray-700">
                    <input type="password" id="passInp" placeholder="Password" class="custom-input font-bold dark:bg-gray-700">
                    <div id="loginBtns">
                        <button onclick="emailAuth('login')" class="btn-glow w-full py-4 text-lg shadow-xl mb-4 uppercase">LOG IN</button>
                        <p class="text-center text-xs text-gray-400 font-bold uppercase">No account? <a href="javascript:toggleEmailMode('signup')" class="text-primary underline">Sign Up</a></p>
                    </div>
                    <div id="signBtns" class="hidden">
                        <button onclick="emailAuth('sign')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl mb-4">CREATE ACCOUNT</button>
                        <p class="text-center text-xs text-gray-400 font-bold uppercase">Have account? <a href="javascript:toggleEmailMode('login')" class="text-green-500 underline">Log In</a></p>
                    </div>
                </div>

                <div id="phoneFormGroup" class="hidden space-y-4">
                    <div id="recaptcha-container"></div>
                    <input type="tel" id="phoneInp" placeholder="09xxxxxxxx" class="custom-input text-center font-black tracking-widest text-lg">
                    <button onclick="phoneAuth()" id="btnPhoneSend" class="btn-glow w-full py-4 shadow-xl uppercase">GET OTP</button>
                    
                    <div id="otpInputArea" class="hidden space-y-4 animate__animated animate__fadeIn">
                        <input type="text" id="otpInp" placeholder="OTP 6-DIGITS" class="custom-input text-center font-black tracking-[0.5em] text-xl">
                        <button onclick="verifyOtp()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-xl">VERIFY</button>
                    </div>
                </div>
            </div>
            <button onclick="closeAuthModal()" class="w-full mt-10 text-gray-300 text-[10px] font-black uppercase tracking-widest hover:text-gray-500">Cancel</button>
        </div>
    </div>

    <script>
        // 1. Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c",
            measurementId: "G-GDYRJDMZCV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_E = "Kritsanapong0710@gmail.com";

        let userActive = null;
        let isMark = false;
        let confirmationResult = null;

        // 2. Auth States
        auth.onAuthStateChanged(function(user) {
            userActive = user;
            const slot = document.getElementById('navUserSlot');
            if (user) {
                isMark = (user.email && user.email.toLowerCase() === ADMIN_E.toLowerCase()) || (user.phoneNumber === '+66967358298');
                const p = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'M'}&background=22c55e&color=fff`;
                slot.innerHTML = `
                    <div class="flex items-center gap-3 bg-white p-1 pr-4 rounded-full border shadow-sm dark:bg-gray-800">
                        <img src="${p}" class="w-10 h-10 rounded-full border-2 border-primary shadow-sm">
                        <div class="flex flex-col"><span class="text-[10px] font-black max-w-[80px] truncate leading-tight dark:text-white">${user.displayName || 'Mark'}</span><span class="text-[8px] font-bold text-primary uppercase">${isMark ? '👑 Admin' : 'Member'}</span></div>
                        <button onclick="auth.signOut()" class="text-red-400 hover:text-red-600 transition-all ml-1"><i class="fa-solid fa-power-off text-xs"></i></button>
                    </div>
                `;
                if(isMark) document.getElementById('adminPanel').classList.remove('hidden');
                closeAuthModal(); fetchExams();
            } else {
                slot.innerHTML = `<button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl font-black text-[10px] hover:bg-green-500 hover:text-white transition-all shadow-sm">LOGIN</button>`;
                document.getElementById('adminPanel').classList.add('hidden');
                isMark = false; fetchExams();
            }
        });

        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuthMode(m) {
            document.getElementById('emailFormGroup').classList.toggle('hidden', m==='phone');
            document.getElementById('phoneFormGroup').classList.toggle('hidden', m==='email');
            document.getElementById('authTabEmail').className = (m==='email') ? 'flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-gray-800' : 'flex-1 py-2 rounded-xl text-xs font-bold transition-all text-gray-400';
            document.getElementById('authTabPhone').className = (m==='phone') ? 'flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-gray-800' : 'flex-1 py-2 rounded-xl text-xs font-bold transition-all text-gray-400';
        }
        function toggleEmailMode(m) { document.getElementById('loginBtns').classList.toggle('hidden', m==='signup'); document.getElementById('signBtns').classList.toggle('hidden', m==='login'); }

        async function handleSocial(prov) {
            const p = (prov==='google') ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.FacebookAuthProvider();
            try { await auth.signInWithPopup(p); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function emailAuth(mode) {
            const e = document.getElementById('emailInp').value;
            const p = document.getElementById('passInp').value;
            try { if(mode==='sign') { await auth.createUserWithEmailAndPassword(e, p); alert("ลงทะเบียนสำเร็จ!"); } else { await auth.signInWithEmailAndPassword(e, p); } } catch (x) { alert(x.message); }
        }

        // --- Phone Auth Logic ---
        function setupRecaptcha() {
            if(!window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
            }
        }

        async function phoneAuth() {
            setupRecaptcha();
            let num = document.getElementById('phoneInp').value;
            if(!num) return alert("กรุณาใส่เบอร์โทรครับ");
            if(num.startsWith('0')) num = '+66' + num.substring(1);
            
            try {
                confirmationResult = await auth.signInWithPhoneNumber(num, window.recaptchaVerifier);
                document.getElementById('otpInputArea').classList.remove('hidden');
                document.getElementById('btnPhoneSend').classList.add('hidden');
                alert("ส่งรหัส OTP เรียบร้อยครับ!");
            } catch (e) { alert(e.message); }
        }

        async function verifyOtp() {
            const code = document.getElementById('otpInp').value;
            try { await confirmationResult.confirm(code); confetti({ particleCount: 150 }); } catch (e) { alert("รหัส OTP ไม่ถูกต้อง!"); }
        }

        // ==========================================
        // 3. AI ENGINE (BRUTE-FORCE RELIABLE VERSION)
        // ==========================================
        function getAiKey() { return localStorage.getItem('mk_master_v9_key') || ""; }

        async function callGemini(promptText) {
            const key = getAiKey();
            if(!key) throw new Error("Mark ครับ! ลืมใส่ API Key หรือเปล่า? (ล็อกอินแอดมินแล้วกดฟันเฟืองด้านบนนะครับ)");
            
            const persona = localStorage.getItem('mk_master_v9_persona') || "คุณเป็นครูผู้เชี่ยวชาญ และคุณจะช่วย Mark ออกแบบ Prompt สำหรับการเรียนการสอนด้วย";
            const reqBody = { contents: [{ parts: [{ text: `[System Personality: ${persona}]\n\n${promptText}` }] }] };

            // 🛑 กลยุทธ์รัวยิง: ลองทุก Endpoint จนกว่า Google จะตอบ 🛑
            const versions = ['v1', 'v1beta'];
            const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
            
            let lastErr = "";
            for (let v of versions) {
                for (let m of models) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${v}/models/${m}:generateContent?key=${key}`;
                        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody) });
                        const data = await response.json();
                        if (data.candidates && data.candidates[0].content) return data.candidates[0].content.parts[0].text;
                        if (data.error) lastErr = `${data.error.message} (${v}/${m})`;
                    } catch (e) { lastErr = e.message; }
                }
            }
            throw new Error(`AI พ่ายแพ้: ${lastErr}\n(แนะนำ: Mark ลองกด "Enable API" หรือสร้าง Key ใหม่ใน AI Studio โปรเจกต์ 'Default' ดูนะครับ)`);
        }

        async function generateWithAI() {
            const topic = document.getElementById('aiTopicInp').value;
            if(!topic) return alert("ระบุเรื่องที่จะออกสอบด้วยครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังวิเคราะห์ข้อมูล...`;
            btn.disabled = true;

            try {
                const res = await callGemini(`จงสร้างข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น ห้ามพิมพ์อย่างอื่น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`);
                document.getElementById('bulkData').value = res;
                document.getElementById('finalExamTitle').value = topic;
                switchView('import'); parseRawText();
            } catch (e) { alert(e.message); } finally { btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> เริ่มออกข้อสอบ`; btn.disabled = false; }
        }

        async function sendChat() {
            const inp = document.getElementById('chatIn');
            const box = document.getElementById('chatBox');
            if(!inp.value) return;
            const msg = inp.value; inp.value = '';

            box.innerHTML += `<div class="flex justify-end"><div class="bg-primary text-white p-4 rounded-3xl rounded-tr-none max-w-[85%] text-sm font-bold shadow-lg animate__animated animate__fadeInRight">${msg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const lID = "l-" + Date.now();
            box.innerHTML += `<div id="${lID}" class="flex gap-2 p-2"><div class="dot-flashing"></div></div>`;

            try {
                const res = await callGemini(msg);
                document.getElementById(lID).remove();
                const n = localStorage.getItem('mk_master_v9_name') || "AI Assistant";
                const i = localStorage.getItem('mk_master_v9_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${i}" class="w-10 h-10 rounded-2xl border-2 border-primary shadow-md object-cover">
                        <div class="bg-white text-gray-700 p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed border dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 shadow-sm">
                            <p class="text-[10px] font-black text-blue-500 mb-1 uppercase">${n}</p>
                            ${res.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lID).innerText = "❌ ERROR: " + e.message; }
        }

        // ==========================================
        // 4. DATABASE & PARSER
        // ==========================================
        function parseRawText() {
            const raw = document.getElementById('bulkData').value;
            const editor = document.getElementById('editorContent'); editor.innerHTML = '';
            const blocks = raw.split('question*(').filter(q => q.trim() !== '');
            blocks.forEach((b, i) => {
                const pts = b.split(')'); if(pts.length < 2) return;
                const qT = pts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                while((m = re.exec(pts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border rounded-2xl hover:border-green-300 dark:bg-gray-700 transition-all">
                            <input type="radio" name="gr_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500">
                            <span class="font-black text-gray-400 uppercase w-6 text-center text-sm">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="v-opt flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }
                editor.innerHTML += `<div class="q-unit app-card fade-up"><textarea class="v-q-val w-full bg-transparent font-black text-xl border-b-2 border-gray-100 pb-4 outline-none focus:border-primary dark:text-white resize-none h-auto">${qT}</textarea><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">${oH}</div></div>`;
            });
            document.getElementById('view-editor').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('view-editor').offsetTop - 50, behavior: 'smooth' });
        }

        async function saveExam() {
            if(!userActive) return alert("ล็อกอินก่อนนะครับ!");
            const data = { title: document.getElementById('finalExamTitle').value || "ชุดข้อสอบใหม่", uid: userActive.uid, owner: userActive.displayName || userActive.email, createdAt: firebase.firestore.FieldValue.serverTimestamp(), visibility: 'private', questions: [] };
            document.querySelectorAll('.q-unit').forEach(c => {
                const opts = []; c.querySelectorAll('.flex.items-center').forEach(r => { opts.push({ text: r.querySelector('.v-opt').value, isCorrect: r.querySelector('input[type="radio"]').checked }); });
                data.questions.push({ q: c.querySelector('.v-q-val').value, options: opts });
            });
            try { await db.collection('exams').add(data); confetti({ particleCount: 200, spread: 100 }); alert("บันทึกสำเร็จ!"); switchView('db'); } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse">กำลังโหลดข้อมูล...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const x = doc.data();
                    const isM = userActive && x.uid === userActive.uid;
                    if(isMark || isM || x.visibility === 'public') {
                        const dStr = x.createdAt ? x.createdAt.toDate().toLocaleDateString('th-TH') : '-';
                        grid.innerHTML += `
                            <div class="app-card border border-gray-100 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isMark || isM) ? `<button onclick="deleteExam('${doc.id}')" class="absolute top-4 right-4 text-red-100 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase border ${x.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${x.visibility}</span>
                                    <h3 class="font-black text-xl mt-4 mb-2 dark:text-white line-clamp-2">${x.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">โดย: ${x.owner} • ${dStr}</p>
                                </div>
                                <button class="w-full py-4 bg-gray-50 border rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-primary hover:text-white transition-all dark:bg-gray-700">Open Exam (${x.questions.length} ข้อ)</button>
                                ${isMark ? `<button onclick="togglePrivacy('${doc.id}','${x.visibility}')" class="w-full py-2 mt-2 text-[9px] font-black text-blue-500 underline uppercase tracking-tighter">สลับสถานะ</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'Error loading: ' + e.message; }
        }

        async function togglePrivacy(id, cur) { await db.collection('exams').doc(id).update({ visibility: (cur==='public'?'private':'public') }); fetchExams(); }
        async function deleteExam(id) { if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExams(); } }

        // ==========================================
        // 5. UI & SETTINGS
        // ==========================================
        function toggleSidebar() { document.getElementById('sideMenu').classList.toggle('translate-x-full'); }
        function updateTheme(t) { document.body.classList.remove('theme-blue', 'theme-dark'); if(t !== 'green') document.body.classList.add('theme-' + t); localStorage.setItem('mk_v9_theme', t); }
        function switchView(target) {
            ['db','import','ai','chat'].forEach(x => { document.getElementById('view-'+x).classList.add('hidden'); document.getElementById('btn-'+x).classList.remove('active'); });
            document.getElementById('view-'+target).classList.remove('hidden'); document.getElementById('btn-'+target).classList.add('active');
            document.getElementById('view-editor').classList.add('hidden'); if(target==='db') fetchExams();
        }

        function saveAdmin() {
            if(!isMark) return;
            localStorage.setItem('mk_master_v9_key', document.getElementById('adm-key').value);
            localStorage.setItem('mk_master_v9_name', document.getElementById('adm-name').value);
            localStorage.setItem('mk_master_v9_img', document.getElementById('adm-img').value);
            localStorage.setItem('mk_master_v9_persona', document.getElementById('adm-persona').value);
            initUI(); alert("Admin Mark: บันทึก Config เรียบร้อยครับ!");
        }

        function initUI() {
            const n = localStorage.getItem('mk_master_v9_name') || "AI Tutor Pro";
            const i = localStorage.getItem('mk_master_v9_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-name-chat').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            document.getElementById('ai-img-chat').src = i;
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getAiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_master_v9_persona') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_v9_theme')) updateTheme(localStorage.getItem('mk_v9_theme'));
            initUI(); switchView('db');
        };
    </script>
</body>
