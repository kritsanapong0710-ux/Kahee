<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuizBuilder Pro - Mark Masterpiece 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        /* 🎨 Dynamic Theme System (แก้ปัญหา Contrast เพื่อ Mark) */
        :root {
            --p-color: #22c55e;
            --p-bg: #f8fafc;
            --p-text: #1e293b;
            --p-card: #ffffff;
            --p-input: #f1f5f9;
        }

        /* ธีมน้ำเงิน (Midnight Navy - ตัวหนังสือขาวอ่านง่าย 100%) */
        body.theme-blue {
            --p-color: #3b82f6;
            --p-bg: #020617; 
            --p-text: #ffffff; 
            --p-card: #0f172a; 
            --p-input: #1e293b;
        }

        /* ธีมมืด */
        body.theme-dark {
            --p-color: #10b981;
            --p-bg: #000000;
            --p-text: #f1f5f9;
            --p-card: #111827;
            --p-input: #1f2937;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--p-bg); 
            color: var(--p-text);
            transition: all 0.4s ease; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-card { 
            background-color: var(--p-card); 
            border-radius: 2rem; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem;
        }

        .btn-glow {
            background-color: var(--p-color);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none;
        }
        .btn-glow:hover { filter: brightness(115%); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* 📱 Mobile Responsive Tab Menu */
        .tab-bar {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            scrollbar-width: none;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 1.5rem;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        
        .tab-item {
            flex: 0 0 auto;
            padding: 14px 24px;
            border-radius: 1.2rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #94a3b8;
            transition: 0.3s;
        }
        .tab-item.active {
            background-color: var(--p-color);
            color: white !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .custom-input {
            background-color: var(--p-input);
            border: 2px solid transparent;
            border-radius: 1.25rem;
            padding: 16px;
            width: 100%;
            outline: none;
            color: var(--p-text);
            transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--p-color); background-color: var(--p-card); }

        @media (max-width: 640px) {
            .app-card { border-radius: 1.5rem; padding: 1.25rem !important; }
            .btn-glow { width: 100%; height: 56px; }
        }

        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: var(--p-color); animation: dot-flashing 1s infinite linear alternate; }
        @keyframes dot-flashing { 0% { background-color: var(--p-color); } 50%, 100% { background-color: rgba(34, 197, 94, 0.2); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] bg-white/70 backdrop-blur-xl border-b border-gray-100 px-4 py-4 md:px-10 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">

                    <i class="fa-solid fa-bolt text-xl"></i>
                </div>

            </div>

        <div id="view-db" class="animate__animated animate__fadeIn">

                <h2 class="text-3xl font-black italic">LIBRARY</h2>
                <button onclick="fetchExamsFromCloud()" class="text-green-500 font-bold bg-green-50 px-5 py-2.5 rounded-xl"><i class="fa-solid fa-rotate mr-2"></i> REFRESH</button>
            </div>
            <div id="examsDisplayGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div id="view-import" class="hidden app-card p-6 md:p-12 animate__animated animate__fadeIn">

            <textarea id="bulkDataInput" class="custom-input h-64 md:h-96 resize-none text-base font-medium dark:bg-gray-900" placeholder="question*(ข้อใด...) *a(...)correct *b(...)nope"></textarea>
            <div class="mt-6 flex justify-end">
                <button onclick="parseAndEdit()" class="btn-glow px-12 py-4 text-lg shadow-xl shadow-green-500/20">ประมวลผล</button>

        <div id="view-ai" class="hidden app-card p-8 md:p-16 animate__animated animate__fadeIn text-center">

        <div id="view-editor" class="hidden mt-8 space-y-6 pb-40">

    <div id="sideSettings" class="fixed right-0 top-0 h-full w-full sm:w-85 bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[100] border-l dark:bg-gray-900">

                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Select Theme</label>
                <div class="flex gap-4">
                    <button onclick="setAppTheme('green')" class="w-12 h-12 rounded-2xl bg-green-500 border-4 border-white shadow-xl hover:scale-110 transition-all"></button>
                    <button onclick="setAppTheme('blue')" class="w-12 h-12 rounded-2xl bg-blue-600 border-4 border-white shadow-xl hover:scale-110 transition-all"></button>
                    <button onclick="setAppTheme('dark')" class="w-12 h-12 rounded-2xl bg-gray-900 border-4 border-white shadow-xl hover:scale-110 transition-all"></button>
                </div>
            </div>

            <div id="adminPanelSecret" class="hidden space-y-6 bg-red-50 p-6 rounded-[2.5rem] border border-red-100 dark:bg-red-900/10">
                <h4 class="font-black text-red-600 text-xs uppercase border-b pb-4 border-red-200 tracking-widest">
                    <i class="fa-solid fa-crown mr-2"></i> Admin Mark Control
                </h4>
                <div class="space-y-4">
                    <input type="password" id="adm-key-field" placeholder="Paste New API Key Here" class="custom-input text-xs font-mono py-3 bg-white">
                    <input type="text" id="adm-name-field" placeholder="ชื่อ AI" class="custom-input text-sm py-3 bg-white">
                    <input type="text" id="adm-img-field" placeholder="ลิงก์รูปโปรไฟล์ AI" class="custom-input text-xs py-3 bg-white">
                    <textarea id="adm-persona-field" placeholder="บุคลิก AI..." class="custom-input text-xs h-24 bg-white"></textarea>
                    <button onclick="saveMarkAdminSettings()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-xl">บันทึก CONFIG แอดมิน</button>

        </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authTitle" class="text-3xl font-black italic text-center mb-10 tracking-tighter uppercase">QuizMaster</h3>
            <div class="space-y-4">
                <button onclick="authSocialLogin()" class="w-full bg-white border py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gray-50 shadow-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Google Login
                </button>
                <div class="flex items-center gap-2 py-4">
                    <hr class="flex-1 border-gray-100"> <span class="text-[10px] text-gray-300 font-bold uppercase">อีเมล</span> <hr class="flex-1 border-gray-100">
                </div>
                <input type="email" id="authEmailInp" placeholder="Email Address" class="custom-input font-bold dark:bg-gray-700">
                <input type="password" id="authPassInp" placeholder="Password" class="custom-input font-bold dark:bg-gray-700">
                
                <div id="loginActionBox">
                    <button onclick="processAuthAction('login')" class="btn-glow w-full py-5 text-lg shadow-xl mb-4 uppercase">LOG IN</button>
                    <p class="text-center text-xs text-gray-400 font-bold">ยังไม่มีบัญชี? <a href="javascript:toggleAuthMode('sign')" class="text-primary underline">สมัครสมาชิก</a></p>
                </div>
                <div id="signupActionBox" class="hidden">
                    <button onclick="processAuthAction('sign')" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl mb-4">SIGN UP</button>
                    <p class="text-center text-xs text-gray-400 font-bold">มีบัญชีอยู่แล้ว? <a href="javascript:toggleAuthMode('login')" class="text-green-500 underline">เข้าสู่ระบบ</a></p>
                </div>
            </div>
            <button onclick="closeAuthModal()" class="w-full mt-10 text-gray-300 text-[10px] font-black uppercase tracking-widest hover:text-gray-500">ยกเลิก</button>
        </div>
    </div>

    <script>
        // 1. Initial
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c",
            measurementId: "G-GDYRJDMZCV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_MARK_EMAIL = "Kritsanapong0710@gmail.com";

        let currentActiveUser = null;
        let isAdminMark = false;

        // 2. Auth Logic
        auth.onAuthStateChanged(function(user) {
            currentActiveUser = user;
            const slot = document.getElementById('navLoginSlot');
            if (user) {
                isAdminMark = (user.email && user.email.toLowerCase() === ADMIN_MARK_EMAIL.toLowerCase()) || (user.phoneNumber === '+66967358298');
                const pic = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'Mark'}&background=22c55e&color=fff`;
                slot.innerHTML = `
                    <div class="flex items-center gap-3 bg-white p-1 pr-4 rounded-full border shadow-sm dark:bg-gray-800">
                        <img src="${pic}" class="w-10 h-10 rounded-full border-2 border-primary">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black max-w-[80px] truncate dark:text-white leading-tight">${user.displayName || 'Mark'}</span>
                            <span class="text-[8px] font-bold text-primary uppercase">${isAdminMark ? '👑 Admin' : 'Member'}</span>
                        </div>
                        <button onclick="auth.signOut()" class="text-red-300 hover:text-red-500 ml-1 transition-all"><i class="fa-solid fa-power-off text-xs"></i></button>
                    </div>
                `;
                if(isAdminMark) document.getElementById('adminSecretPanel').classList.remove('hidden');
                closeAuthModal();
                fetchExamsFromCloud();
            } else {
                slot.innerHTML = `<button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl font-black text-[11px] hover:bg-green-500 hover:text-white transition-all shadow-sm">LOGIN</button>`;
                document.getElementById('adminSecretPanel').classList.add('hidden');
                isAdminMark = false;
                fetchExamsFromCloud();
            }
        });

        function openAuthModal(m) { document.getElementById('authModal').classList.remove('hidden'); toggleAuthMode(m); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function toggleAuthMode(m) {
            const isSignup = (m === 'sign');
            document.getElementById('loginActionBox').classList.toggle('hidden', isSignup);
            document.getElementById('signupActionBox').classList.toggle('hidden', !isSignup);
            document.getElementById('authTitle').innerText = isSignup ? "JOIN US" : "QUIZMASTER";
        }

        async function authSocialLogin() {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function processAuthAction(mode) {
            const email = document.getElementById('authEmailInp').value;
            const pass = document.getElementById('authPassInp').value;
            try {
                if(mode==='sign') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await res.user.sendEmailVerification();
                    alert("ลงทะเบียนแล้ว! ยืนยันในอีเมลนะครับ");
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch (x) { alert(x.message); }
        }

        // ==========================================
        // 3. AI ENGINE (DYNAMIC MULTI-MODEL FALLBACK)
        // ==========================================
        function getMarkApiKey() { return localStorage.getItem('mk_v_god_key') || ""; }

        async function callGeminiDynamic(prompt) {
            const key = getMarkApiKey();
            if(!key) throw new Error("Mark ครับ! ลืมใส่ API Key ในหน้าแอดมินหรือเปล่า? (ล็อกอินแอดมินแล้วกดฟันเฟืองด้านบนนะครับ)");
            
            const persona = localStorage.getItem('mk_v_god_persona') || "คุณเป็นครูติวเตอร์อัจฉริยะ";
            const reqBody = { contents: [{ parts: [{ text: `[System Personality: ${persona}]\n\n${prompt}` }] }] };

            // 🛑 กลยุทธ์ "Kill Bug Once and For All": ลองทุกทางเลือกจนกว่าจะสำเร็จ 🛑
            const versions = ['v1', 'v1beta'];
            const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
            
            let lastErrData = null;

            for (let v of versions) {
                for (let m of models) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${v}/models/${m}:generateContent?key=${key}`;
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(reqBody)
                        });
                        const data = await response.json();
                        
                        if (data.candidates && data.candidates[0].content) {
                            console.log(`✅ AI Connected via ${v}/${m}`);
                            return data.candidates[0].content.parts[0].text;
                        } else if (data.error) {
                            lastErrData = data.error;
                            console.warn(`Attempt failed: ${v}/${m} - ${data.error.message}`);
                        }
                    } catch (e) { lastErrData = { message: e.message }; }
                }
            }
            
            // ถ้าไม่ติดเลยแม้แต่อันเดียว
            const errorMsg = lastErrData ? lastErrData.message : "ไม่มีการตอบสนองจาก Google";
            throw new Error(`AI พ่ายแพ้: ${errorMsg}\n(คำแนะนำ: Mark ลองกดสร้าง API Key ใหม่ใน AI Studio แล้วเลือกโปรเจกต์ 'Default' นะครับ)`);
        }

        async function triggerAIGeneration() {
            const topic = document.getElementById('aiTopicField').value;
            if(!topic) return alert("ระบุเรื่องที่อยากให้ออกสอบด้วยครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> AI กำลังคิดคำนวณ...`;
            btn.disabled = true;

            try {
                const res = await callGeminiDynamic(`จงสร้างข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น ห้ามพิมพ์อย่างอื่น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`);
                document.getElementById('bulkDataInput').value = res;
                document.getElementById('saveExamTitleInp').value = topic;
                switchView('import');
                parseAndEdit();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> เริ่มออกข้อสอบ`;
                btn.disabled = false;
            }
        }

        async function sendChatToAI() {
            const inp = document.getElementById('chatInputField');
            const box = document.getElementById('chatMessageArea');
            if(!inp.value) return;
            const userMsg = inp.value; inp.value = '';

            box.innerHTML += `<div class="flex justify-end"><div class="bg-primary text-white p-4 rounded-3xl rounded-tr-none max-w-[85%] text-sm font-bold shadow-lg animate__animated animate__fadeInRight">${userMsg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const tempId = "l-" + Date.now();
            box.innerHTML += `<div id="${tempId}" class="flex gap-2 p-2"><div class="dot-flashing"></div></div>`;

            try {
                const res = await callGeminiDynamic(userMsg);
                document.getElementById(tempId).remove();
                const aiN = localStorage.getItem('mk_v_god_name') || "AI Assistant";
                const aiA = localStorage.getItem('mk_v_god_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${aiA}" class="w-10 h-10 rounded-2xl border-2 border-primary shadow-md object-cover">
                        <div class="bg-white text-gray-700 p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed border dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 shadow-sm">
                            <p class="text-[10px] font-black text-blue-500 mb-1 uppercase">${aiN}</p>
                            ${res.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(tempId).innerText = "❌ ERROR: " + e.message; }
        }

        // ==========================================
        // 4. DATA PARSER & CLOUD
        // ==========================================
        function parseAndEdit() {
            const rawText = document.getElementById('bulkDataInput').value;
            const container = document.getElementById('editorCardsContainer'); container.innerHTML = '';
            const questions = rawText.split('question*(').filter(q => q.trim() !== '');
            
            questions.forEach((block, index) => {
                const parts = block.split(')'); if(parts.length < 2) return;
                const qText = parts[0].trim();
                const regex = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let match, optsHtml = '';
                while((m = regex.exec(parts[1])) !== null) {
                    optsHtml += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border rounded-2xl hover:border-primary/40 dark:bg-gray-700 transition-all">
                            <input type="radio" name="grp_${index}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500">
                            <span class="font-black text-gray-400 uppercase w-6 text-center text-sm">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="v-opt-val flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }
                container.innerHTML += `
                    <div class="exam-card-unit app-card relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-6 right-6 text-gray-300 hover:text-red-500 transition-all"><i class="fa-solid fa-trash-can text-xl"></i></button>
                        <textarea class="v-q-val w-full bg-transparent font-black text-xl md:text-2xl border-b-2 border-gray-100 pb-4 outline-none focus:border-primary transition-all dark:text-white resize-none h-auto">${qText}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">${optsHtml}</div>
                    </div>
                `;
            });
            document.getElementById('view-editor').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('view-editor').offsetTop - 50, behavior: 'smooth' });
        }

        async function commitExamToFirebase() {
            if(!currentActiveUser) return alert("ล็อกอินก่อนนะครับแอดมิน!");
            const data = {
                title: document.getElementById('saveExamTitleInp').value || "ชุดข้อสอบใหม่",
                uid: currentActiveUser.uid, owner: currentActiveUser.displayName || currentActiveUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };
            document.querySelectorAll('.exam-card-unit').forEach(card => {
                const opts = [];
                card.querySelectorAll('.flex.items-center').forEach(row => {
                    opts.push({ text: row.querySelector('.v-opt-val').value, isCorrect: row.querySelector('input[type="radio"]').checked });
                });
                data.questions.push({ q: card.querySelector('.v-q-val').value, options: opts });
            });
            try { await db.collection('exams').add(data); confetti({ particleCount: 200, spread: 100 }); alert("บันทึกลงคลังสำเร็จ!"); switchView('db'); } catch (e) { alert(e.message); }
        }

        async function fetchExamsFromCloud() {
            const grid = document.getElementById('examsDisplayGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse">กำลังโหลดข้อมูล...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const x = doc.data();
                    const isM = currentActiveUser && x.uid === currentActiveUser.uid;
                    if(isAdminMark || isM || x.visibility === 'public') {
                        const date = x.createdAt ? x.createdAt.toDate().toLocaleDateString('th-TH') : '-';
                        grid.innerHTML += `
                            <div class="app-card border border-gray-100 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isAdminMark || isM) ? `<button onclick="deleteExamByID('${doc.id}')" class="absolute top-4 right-4 text-red-100 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase border ${x.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${x.visibility}</span>
                                    <h3 class="font-black text-xl mt-4 mb-2 dark:text-white line-clamp-2">${x.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">โดย: ${x.owner} • ${date}</p>
                                </div>
                                <button onclick="alert('เร็วๆ นี้')" class="w-full py-4 bg-gray-50 border rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-primary hover:text-white transition-all dark:bg-gray-700">Open Exam (${x.questions.length} ข้อ)</button>
                                ${isAdminMark ? `<button onclick="togglePrivacy('${doc.id}','${x.visibility}')" class="w-full py-2 mt-2 text-[9px] font-black text-blue-500 underline uppercase tracking-tighter">สลับสถานะ</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'Error loading data'; }
        }

        async function togglePrivacy(id, cur) { await db.collection('exams').doc(id).update({ visibility: (cur==='public'?'private':'public') }); fetchExamsFromCloud(); }
        async function deleteExamByID(id) { if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExamsFromCloud(); } }

        // ==========================================
        // 5. THEMES & SETTINGS
        // ==========================================
        function toggleSidebar() { document.getElementById('sideSettings').classList.toggle('translate-x-full'); }
        function setAppTheme(t) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(t !== 'green') document.body.classList.add('theme-' + t);
            localStorage.setItem('mk_v_god_theme', t);
        }
        function switchView(target) {
            ['db','import','ai','chat'].forEach(x => {
                document.getElementById('view-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active');
            });
            document.getElementById('view-'+target).classList.remove('hidden');
            document.getElementById('btn-'+target).classList.add('active');
            document.getElementById('view-editor').classList.add('hidden');
            if(target==='db') fetchExamsFromCloud();
        }

        function saveMarkAdminSettings() {
            if(!isAdminMark) return;
            localStorage.setItem('mk_v_god_key', document.getElementById('adm-key-field').value);
            localStorage.setItem('mk_v_god_name', document.getElementById('adm-name-field').value);
            localStorage.setItem('mk_v_god_img', document.getElementById('adm-img-field').value);
            localStorage.setItem('mk_v_god_persona', document.getElementById('adm-persona-field').value);
            initGodConfigs(); alert("Admin Mark: บันทึกข้อมูลสำเร็จ!");
        }

        function initGodConfigs() {
            const name = localStorage.getItem('mk_v_god_name') || "AI Tutor Pro";
            const img = localStorage.getItem('mk_v_god_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = name;
            document.getElementById('ai-name-chat').innerText = name;
            document.getElementById('ai-avatar-gen').src = img;
            document.getElementById('ai-avatar-chat').src = img;
            
            document.getElementById('adm-name-field').value = name;
            document.getElementById('adm-img-field').value = img;
            document.getElementById('adm-key-field').value = getMarkApiKey();
            document.getElementById('adm-persona-field').value = localStorage.getItem('mk_v_god_persona') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_v_god_theme')) setAppTheme(localStorage.getItem('mk_v_god_theme'));
            initGodConfigs(); switchView('db');
        };
    </script>
</body>
</html>
