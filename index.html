<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies Original Quiz</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .q-container { margin-bottom: 30px; display: none; }
        .q-container.active { display: block; }
        .question { font-size: 1.3em; font-weight: bold; margin-bottom: 20px; color: #333; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; background: none; cursor: pointer; text-align: left; font-size: 1.1em; transition: 0.3s; }
        .option-btn:hover { background-color: #f8f9fa; border-color: #1a73e8; }
        .footer { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .exit-btn { padding: 10px 25px; background: #ea4335; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .score-board { text-align: center; display: none; }
        .progress { color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-box">
    <h1>Social Studies Final Exam (29 Questions)</h1>
    <div id="questions-area"></div>
    
    <div class="footer">
        <div class="progress" id="progress-text">Question 1 of 29</div>
        <button class="exit-btn" onclick="exitApp()">EXIT</button>
    </div>
</div>

<div class="quiz-card score-board" id="score-box">
    <h1>Exam Finished!</h1>
    <p style="font-size: 2em;">Your Score: <span id="final-score"></span> / 29</p>
    <button onclick="location.reload()" style="padding: 15px 30px; background: #34a853; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.2em;">Restart Exam</button>
</div>

<script>
    const questions = [
        { q: "Once a law has been approved by the House of Representatives, who is it sent to?", o: ["The King", "The Prime Minister", "The Senate", "The Thai people"], a: 2 },
        { q: "The Senate must debate and approve a law within how many days?", o: ["30 days", "7 days", "60 days", "20 days"], a: 2 },
        { q: "During the FIRST READING, the bill is:", o: ["Approved immediately", "Debated in detail", "Sent to King", "Voted on to be considered"], a: 3 },
        { q: "What is 'Royal Endorsement'?", o: ["MPs voting", "The King signing the bill", "Police enforcement", "Public protest"], a: 1 },
        { q: "Where is the law officially printed?", o: ["Newspapers", "School books", "The Royal Gazette", "Facebook"], a: 2 },
        { q: "Which step involves detailed examination by a committee?", o: ["2nd Reading", "Committee Review", "1st Reading", "Senate Approval"], a: 1 },
        { q: "Which step involves debating in detail and suggesting changes?", o: ["3rd Reading", "2nd Reading", "Proposal", "Royal Endorsement"], a: 1 },
        { q: "The final version of the bill is voted on in which step?", o: ["1st Reading", "Committee Review", "3rd Reading", "Publication"], a: 2 },
        { q: "When the bill is officially introduced by an MP, it is called:", o: ["Proposal of a Bill", "Senate Approval", "2nd Reading", "Royal Endorsement"], a: 0 },
        { q: "When was the first constitution of Thailand signed?", o: ["10th Dec 1932", "24th June 1932", "10th Feb 2014"], a: 0 },
        { q: "How many constitutions has Thailand had since 1932?", o: ["15", "20", "25", "35"], a: 1 },
        { q: "In 1973, why were 13 people arrested?", o: ["Theft", "Asking for a constitution", "Tax evasion"], a: 1 },
        { q: "NPKC led a coup in 1991 against which PM?", o: ["Chatichai", "Thaksin", "Suchinda"], a: 0 },
        { q: "Who was ousted in the 2006 Coup?", o: ["Suchinda", "Thaksin Shinawatra", "Prayut"], a: 1 },
        { q: "What is a social institution?", o: ["Party place", "System to organize society", "Group of friends"], a: 1 },
        { q: "Which is an example of a social institution?", o: ["Family", "School", "Government", "All of the above"], a: 3 },
        { q: "Which institution creates and enforces laws?", o: ["Family", "Government", "Religion", "Education"], a: 1 },
        { q: "Why is family important?", o: ["Makes money", "Provides love & teaches values", "Builds hospitals"], a: 1 },
        { q: "Which satisfies need for belief and teaches right/wrong?", o: ["Economic", "Religious", "Emotional", "Family"], a: 1 },
        { q: "What does 'Mesopotamia' mean?", o: ["Land of gold", "Land between rivers", "Great empire"], a: 1 },
        { q: "Mesopotamia was between which rivers?", o: ["Indus/Ganges", "Tigris/Euphrates", "Yellow/Yangtze"], a: 1 },
        { q: "Mesopotamia modern location includes:", o: ["Thailand/Laos", "Iraq/Iran/Syria/Turkey", "India/Pakistan"], a: 1 },
        { q: "Where was Indus (Harappan) civilization found?", o: ["Nile", "Indus/Ganges Rivers", "Yellow River"], a: 1 },
        { q: "Ancient China was located along which river?", o: ["Mekong", "Indus", "Yellow River (Huang He)"], a: 2 },
        { q: "What is a 'Ziggurat'?", o: ["A king", "A religious structure", "A type of food"], a: 1 },
        { q: "Which religion began in East Asia?", o: ["Christianity", "Buddhism and Hindu", "Hebrew"], a: 1 },
        { q: "What is the book of Hinduism called?", o: ["The Bible", "The Veda", "The Koran"], a: 1 },
        { q: "What is the royal ploughing ceremony?", o: ["Birth ceremony", "Crowning ceremony", "Start of planting season"], a: 2 },
        { q: "When do Christians get baptised?", o: ["When they die", "At Christmas", "When they are born"], a: 2 }
    ];

    let currentIdx = 0;
    let score = 0;

    const questionsArea = document.getElementById('questions-area');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = `q-container ${index === 0 ? 'active' : ''}`;
        div.id = `q-${index}`;
        div.innerHTML = `
            <div class="question">${index + 1}. ${item.q}</div>
            <div class="options">
                ${item.o.map((opt, i) => `<button class="option-btn" onclick="nextQ(${index}, ${i})">${opt}</button>`).join('')}
            </div>
        `;
        questionsArea.appendChild(div);
    });

    function nextQ(qIdx, selectedIdx) {
        if (selectedIdx === questions[qIdx].a) score++;
        document.getElementById(`q-${qIdx}`).classList.remove('active');
        currentIdx++;
        if (currentIdx < questions.length) {
            document.getElementById(`q-${currentIdx}`).classList.add('active');
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }

    function exitApp() {
        if(confirm("Do you want to exit the exam?")) {
            window.close();
            alert("Quiz Closed");
        }
    }
</script>
</body>
</html>
