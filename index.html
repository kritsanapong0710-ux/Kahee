<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBuilder Pro - Mark Official Masterpiece</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <style>
        /* 🎨 ระบบธีมและ Contrast (แก้ไขเพื่อ Mark โดยเฉพาะ) */
        :root {
            --primary: #22c55e;
            --bg-site: #f8fafc;
            --text-main: #1e293b;
            --card-bg: #ffffff;
            --input-bg: #f1f5f9;
        }

        /* ธีมน้ำเงิน (Midnight Blue - High Contrast) */
        body.theme-blue {
            --primary: #3b82f6;
            --bg-site: #020617; /* พื้นหลังดำน้ำเงินมืดสนิท */
            --text-main: #f8fafc; /* ตัวหนังสือขาวสว่าง */
            --card-bg: #0f172a; /* การ์ดน้ำเงินเข้ม */
            --input-bg: #1e293b;
        }

        /* ธีมมืด */
        body.theme-dark {
            --primary: #10b981;
            --bg-site: #000000;
            --text-main: #f1f5f9;
            --card-bg: #111827;
            --input-bg: #1f2937;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-site); 
            color: var(--text-main);
            transition: all 0.4s ease; 
        }

        /* UI Components */
        .app-card { 
            background-color: var(--card-bg); 
            border-radius: 2rem; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-glow {
            background-color: var(--primary);
            color: white;
            border-radius: 1.25rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }
        .btn-glow:hover {
            filter: brightness(115%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary);
        }

        /* Mobile Responsive Tabs */
        .tab-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 5px;
            scrollbar-width: none;
        }
        .tab-scroller::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            flex: 0 0 auto;
            padding: 12px 24px;
            border-radius: 1.25rem;
            font-weight: 700;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .smart-input {
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 1.25rem;
            padding: 14px;
            width: 100%;
            outline: none;
            color: var(--text-main);
            transition: 0.3s;
        }
        .smart-input:focus { border-color: var(--primary); background: var(--card-bg); }

        /* Fix: จอมือถือไม่ให้เบียด */
        @media (max-width: 640px) {
            .app-card { border-radius: 1.5rem; padding: 1.5rem !important; }
            h2 { font-size: 1.5rem !important; }
            .btn-glow { width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] bg-white/70 backdrop-blur-xl border-b border-gray-100 px-4 py-4 md:px-8 dark:bg-gray-900/80 dark:border-gray-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-primary p-2.5 rounded-2xl text-white shadow-lg shadow-green-500/20">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter uppercase">QUIZ<span class="text-primary">PRO</span></h1>
            </div>
            
            <div class="flex items-center gap-2">
                <div id="navAuthSlot">

                </div>
                <button onclick="toggleSidebar()" class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-gray-100 text-gray-400 transition-all">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 md:px-6 mt-6">
        
        <div class="tab-scroller mb-10 bg-gray-100/50 p-1.5 rounded-[1.5rem] dark:bg-gray-800">
            <button onclick="switchPage('db')" id="btn-db" class="tab-btn active"><i class="fa-solid fa-database mr-2"></i> คลังข้อสอบ</button>
            <button onclick="switchPage('import')" id="btn-import" class="tab-btn"><i class="fa-solid fa-paste mr-2"></i> วางโจทย์ดิบ</button>
            <button onclick="switchPage('ai')" id="btn-ai" class="tab-btn"><i class="fa-solid fa-robot mr-2"></i> AI เจนให้</button>
            <button onclick="switchPage('chat')" id="btn-chat" class="tab-btn"><i class="fa-solid fa-comment-dots mr-2"></i> ติวกับ AI</button>

        <div id="view-db" class="animate__animated animate__fadeIn">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl md:text-3xl font-black">MY LIBRARY</h2>
                <button onclick="fetchExams()" class="text-primary font-bold"><i class="fa-solid fa-rotate"></i></button>
            </div>
            <div id="examsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>

        <div id="view-import" class="hidden app-card p-6 md:p-12 animate__animated animate__fadeIn">

            <div class="mt-6 flex justify-end">

            </div>
        </div>

        <div id="view-ai" class="hidden app-card p-8 md:p-16 animate__animated animate__fadeIn text-center">
            <img id="ai-img-gen" src="https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff" class="w-24 h-24 rounded-[2rem] mx-auto mb-6 shadow-2xl border-4 border-white object-cover">
            <h2 id="ai-name-gen" class="text-3xl font-black mb-4">AI Smart Assistant</h2>
            <div class="max-w-xl mx-auto space-y-4">
                <input type="text" id="aiTopicInp" placeholder="ระบุหัวข้อวิชาที่จะออกสอบ..." class="smart-input text-center font-bold text-xl dark:bg-gray-800">
                <button onclick="generateWithAI()" id="aiGenBtn" class="btn-glow w-full py-5 text-xl flex items-center justify-center gap-3">

            </div>
        </div>

        <div id="view-chat" class="hidden app-card p-4 md:p-6 animate__animated animate__fadeIn flex flex-col h-[60vh] md:h-[75vh]">
            <div id="chatMessages" class="flex-1 overflow-y-auto space-y-6 p-4 custom-scroll"></div>
            <div class="p-3 border-t dark:border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="chatInput" class="smart-input flex-1" placeholder="คุยกับ AI..." onkeypress="if(event.key=='Enter')sendChat()">
                    <button onclick="sendChat()" class="btn-glow w-14 h-14 flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </div>

        </div>

        <div id="view-editor" class="hidden mt-8 space-y-6 pb-40">
            <div id="editorContent" class="space-y-6"></div>
            <div class="fixed bottom-6 left-4 right-4 max-w-2xl mx-auto bg-white/90 backdrop-blur-lg p-5 rounded-[2.5rem] shadow-2xl border flex flex-col md:flex-row gap-3 items-center z-40 dark:bg-gray-800/90">
                <input type="text" id="finalTitle" placeholder="ตั้งชื่อชุดข้อสอบนี้" class="smart-input flex-1 font-bold text-center dark:bg-gray-700">
                <button onclick="saveExam()" class="btn-glow px-12 py-4 w-full md:w-auto">บันทึกคลัง</button>
            </div>
        </div>

    </main>

    <div id="sideSettings" class="fixed right-0 top-0 h-full w-full sm:w-85 bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[100] border-l dark:bg-gray-900">
        <div class="p-8 border-b flex justify-between items-center dark:border-gray-800">
            <h3 class="font-black text-xl">SETTINGS</h3>
            <button onclick="toggleSidebar()" class="text-3xl text-gray-400">&times;</button>
        </div>
        <div class="p-8 space-y-10 overflow-y-auto h-[85%]">
            <div>

                    <button onclick="updateTheme('green')" class="w-12 h-12 rounded-2xl bg-green-500 border-4 border-white shadow-lg"></button>
                    <button onclick="updateTheme('blue')" class="w-12 h-12 rounded-2xl bg-blue-600 border-4 border-white shadow-lg"></button>
                    <button onclick="updateTheme('dark')" class="w-12 h-12 rounded-2xl bg-gray-900 border-4 border-white shadow-lg"></button>
                </div>
            </div>

            <div id="adminPanel" class="hidden space-y-6 bg-red-50 p-6 rounded-[2.5rem] border border-red-100 dark:bg-red-900/10">
                <h4 class="font-black text-red-600 text-xs uppercase tracking-widest border-b pb-3">Admin Mark Control</h4>
                <div class="space-y-4">
                    <input type="password" id="adm-key" placeholder="Gemini API Key (แปะที่นี่!)" class="smart-input text-xs font-mono py-3">
                    <input type="text" id="adm-name" placeholder="ชื่อ AI" class="smart-input text-sm py-3">
                    <input type="text" id="adm-img" placeholder="ลิงก์รูป AI" class="smart-input text-xs py-3">

                    <button onclick="saveAdminSettings()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold">บันทึก Admin</button>

    <div id="authModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm animate__animated animate__zoomIn dark:bg-gray-800">
            <h3 id="authTitle" class="text-3xl font-black text-center mb-10 tracking-tighter uppercase">QuizMaster</h3>
            <div class="space-y-4">
                <button onclick="authSocial('google')" class="w-full bg-white border py-4 rounded-2xl font-bold flex justify-center gap-3 hover:bg-gray-50 shadow-sm dark:bg-gray-700 dark:border-gray-600">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6"> Google
                </button>
                <div class="flex items-center gap-2 py-4">
                    <hr class="flex-1 border-gray-100"> <span class="text-[10px] text-gray-300 font-bold uppercase">อีเมล</span> <hr class="flex-1 border-gray-100">
                </div>
                <input type="email" id="emailInp" placeholder="อีเมล" class="smart-input font-bold dark:bg-gray-700">
                <input type="password" id="passInp" placeholder="รหัสผ่าน" class="smart-input font-bold dark:bg-gray-700">
                
                <div id="loginGroup">
                    <button onclick="handleAuth('login')" class="btn-glow w-full py-5 text-lg shadow-xl mb-4">LOG IN</button>
                    <p class="text-center text-xs text-gray-400 font-bold">ยังไม่มีบัญชี? <a href="javascript:switchAuth('sign')" class="text-primary underline">สมัครสมาชิก</a></p>
                </div>
                <div id="signGroup" class="hidden">
                    <button onclick="handleAuth('sign')" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl mb-4">SIGN UP</button>
                    <p class="text-center text-xs text-gray-400 font-bold">มีบัญชีแล้ว? <a href="javascript:switchAuth('login')" class="text-green-500 underline">เข้าสู่ระบบ</a></p>
                </div>
            </div>
            <button onclick="closeAuthModal()" class="w-full mt-10 text-gray-300 text-[10px] font-black uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        // 1. Init Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA0-4a5zxaPZZejG955NgNUVM23YXNV2Gc",
            authDomain: "the-web-for-test.firebaseapp.com",
            projectId: "the-web-for-test",
            storageBucket: "the-web-for-test.firebasestorage.app",
            messagingSenderId: "198176720357",
            appId: "1:198176720357:web:64d613b64edbfb15dc9b0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_MARK_EMAIL = "Kritsanapong0710@gmail.com";

        let userC = null;
        let isA = false;

        // 2. Auth State
        auth.onAuthStateChanged(function(user) {
            userC = user;
            const slot = document.getElementById('navAuthSlot');
            if (user) {
                isA = (user.email && user.email.toLowerCase() === ADMIN_MARK_EMAIL.toLowerCase()) || (user.phoneNumber === '+66967358298');
                const pic = user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName || 'Mark'}&background=22c55e&color=fff`;
                slot.innerHTML = `
                    <div class="flex items-center gap-3 bg-white p-1 pr-4 rounded-full border shadow-sm dark:bg-gray-800">
                        <img src="${pic}" class="w-10 h-10 rounded-full border-2 border-primary">
                        <span class="text-[10px] font-black max-w-[80px] truncate leading-tight dark:text-white">${user.displayName || 'User'}</span>
                        <button onclick="auth.signOut()" class="text-red-300 hover:text-red-500 ml-1 transition-colors"><i class="fa-solid fa-power-off text-xs"></i></button>
                    </div>
                `;
                if(isA) document.getElementById('adminPanel').classList.remove('hidden');
                closeAuthModal();
                fetchExams();
            } else {
                slot.innerHTML = `<button onclick="openAuthModal('login')" class="bg-gray-100 text-gray-700 px-5 py-2.5 rounded-xl font-black text-xs hover:bg-primary hover:text-white transition-all shadow-sm">LOGIN</button>`;
                document.getElementById('adminPanel').classList.add('hidden');
                isA = false;
                fetchExams();
            }
        });

        function openAuthModal(m) { document.getElementById('authModal').classList.remove('hidden'); switchAuth(m); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function switchAuth(m) {
            const isSign = m === 'sign';
            document.getElementById('loginGroup').classList.toggle('hidden', isSign);
            document.getElementById('signGroup').classList.toggle('hidden', !isSign);
            document.getElementById('authTitle').innerText = isSign ? "SIGN UP" : "WELCOME";
        }

        async function authSocial() {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch (e) { alert(e.message); }
        }

        async function handleAuth(mode) {
            const e = document.getElementById('emailInp').value;
            const p = document.getElementById('passInp').value;
            try {
                if(mode==='sign') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await res.user.sendEmailVerification();
                    alert("สมัครแล้ว! ยืนยันในอีเมลนะครับ");
                } else { await auth.signInWithEmailAndPassword(e, p); }
            } catch (x) { alert(x.message); }
        }

        // 3. AI SYSTEM (THE ULTIMATE BRUTE-FORCE FIX)
        function getAiKey() { return localStorage.getItem('mk_final_v5_key') || ""; }

        async function callGemini(promptText) {
            const key = getAiKey();
            if(!key) throw new Error("Mark ครับ! ลืมแปะ API Key หรือเปล่า? (ล็อกอินแอดมินแล้วกดฟันเฟืองด้านบนนะครับ)");
            
            const persona = localStorage.getItem('mk_final_v5_persona') || "คุณเป็นครูติวเตอร์อัจฉริยะ";
            const reqBody = { contents: [{ parts: [{ text: `[System Personality: ${persona}]\n\n${promptText}` }] }] };

            // 🛑 กลยุทธ์รัวยิง: ลองทุก Endpoint จนกว่า Google จะยอมตอบ 🛑
            const versions = ['v1', 'v1beta'];
            const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
            
            let lastErr = "";

            for (let v of versions) {
                for (let m of models) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${v}/models/${m}:generateContent?key=${key}`;
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(reqBody)
                        });
                        const data = await res.json();
                        
                        if (data.candidates && data.candidates[0].content) {
                            console.log(`✅ Success with ${v}/${m}`);
                            return data.candidates[0].content.parts[0].text;
                        } else if (data.error) {
                            lastErr = `${data.error.message} (${v}/${m})`;
                        }
                    } catch (e) { lastErr = e.message; }
                }
            }
            throw new Error(`AI ล้มเหลวทุกช่องทาง: ${lastErr}\n(แนะนำ: Mark ลองกดสร้าง API Key ใหม่ใน AI Studio ดูนะครับ)`);
        }

        async function generateWithAI() {
            const topic = document.getElementById('aiTopicInp').value;
            if(!topic) return alert("ระบุหัวข้อที่จะออกสอบด้วยครับ");
            const btn = document.getElementById('aiGenBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังวิเคราะห์...`;
            btn.disabled = true;

            try {
                const res = await callGemini(`ออกข้อสอบ 5 ข้อ เรื่อง "${topic}" รูปแบบโค้ดเท่านั้น: question*(คำถาม) *a(ข้อ1)correct *b(ข้อ2)nope *c(ข้อ3)nope *d(ข้อ4)nope`);
                document.getElementById('bulkInput').value = res;
                document.getElementById('finalTitle').value = topic;
                switchPage('import');
                parseRawText();
            } catch (e) { alert(e.message); } finally {
                btn.innerHTML = `<i class="fa-solid fa-sparkles"></i> เริ่มออกข้อสอบ`;
                btn.disabled = false;
            }
        }

        async function sendChat() {
            const inp = document.getElementById('chatInput');
            const box = document.getElementById('chatMessages');
            if(!inp.value) return;
            const msg = inp.value; inp.value = '';

            box.innerHTML += `<div class="flex justify-end"><div class="bg-primary text-white p-4 rounded-3xl rounded-tr-none max-w-[85%] text-sm font-bold shadow-lg animate__animated animate__fadeInRight">${msg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const lID = "l-" + Date.now();
            box.innerHTML += `<div id="${lID}" class="text-[10px] font-black opacity-30 animate-pulse uppercase">AI กำลังคิด...</div>`;

            try {
                const res = await callGemini(msg);
                document.getElementById(lID).remove();
                const n = localStorage.getItem('mk_final_v5_name') || "AI Assistant";
                const i = localStorage.getItem('mk_final_v5_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
                box.innerHTML += `
                    <div class="flex items-start gap-2 animate__animated animate__fadeInLeft">
                        <img src="${i}" class="w-10 h-10 rounded-2xl border-2 border-primary shadow-md object-cover">
                        <div class="bg-white text-gray-700 p-5 rounded-3xl rounded-tl-none max-w-[85%] text-sm leading-relaxed border dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                            <p class="text-[10px] font-black text-blue-500 mb-1 uppercase">${n}</p>
                            ${res.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            } catch (e) { document.getElementById(lID).innerText = "❌ ERROR: " + e.message; }
        }

        // 4. Parser & Database
        function parseRawText() {
            const raw = document.getElementById('bulkInput').value;
            const editor = document.getElementById('editorContent'); editor.innerHTML = '';
            const blocks = raw.split('question*(').filter(q => q.trim() !== '');
            
            blocks.forEach((b, i) => {
                const pts = b.split(')'); if(pts.length < 2) return;
                const qT = pts[0].trim();
                const re = /\*([a-z0-9ก-ฮ])\((.*?)\)(correct|nope)/gi;
                let m, oH = '';
                while((m = re.exec(pts[1])) !== null) {
                    oH += `
                        <div class="flex items-center gap-4 p-4 bg-gray-50 border rounded-2xl dark:bg-gray-700">
                            <input type="radio" name="g_${i}" ${m[3].toLowerCase()==='correct'?'checked':''} class="w-6 h-6 accent-green-500">
                            <span class="font-bold text-gray-400 uppercase w-6 text-center text-sm">${m[1]}.</span>
                            <input type="text" value="${m[2]}" class="v-opt flex-1 bg-transparent outline-none font-bold text-sm">
                        </div>
                    `;
                }
                editor.innerHTML += `
                    <div class="q-item app-card p-6 md:p-10 relative group animate__animated animate__fadeInUp">
                        <button onclick="this.parentElement.remove()" class="absolute top-6 right-6 text-gray-200 hover:text-red-500"><i class="fa-solid fa-trash-can text-xl"></i></button>
                        <textarea class="v-q w-full bg-transparent font-black text-2xl border-b-2 border-gray-100 pb-4 outline-none focus:border-primary transition-all dark:text-white">${qT}</textarea>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">${oH}</div>
                    </div>
                `;
            });
            document.getElementById('view-editor').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('view-editor').offsetTop - 50, behavior: 'smooth' });
        }

        async function saveExam() {
            if(!userC) return alert("ล็อกอินก่อนนะครับ!");
            const data = {
                title: document.getElementById('finalTitle').value || "ชุดข้อสอบใหม่",
                uid: userC.uid, owner: userC.displayName || userC.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                visibility: 'private', questions: []
            };
            document.querySelectorAll('.q-item').forEach(c => {
                const opts = [];
                c.querySelectorAll('.flex.items-center').forEach(r => {
                    opts.push({ text: r.querySelector('.v-opt').value, isCorrect: r.querySelector('input[type="radio"]').checked });
                });
                data.questions.push({ q: c.querySelector('.v-q').value, options: opts });
            });
            try { await db.collection('exams').add(data); confetti({ particleCount: 150, spread: 80 }); alert("บันทึกสำเร็จ!"); switchPage('db'); } catch (e) { alert(e.message); }
        }

        async function fetchExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 animate-pulse">กำลังโหลด...</div>';
            try {
                const snap = await db.collection('exams').orderBy('createdAt','desc').get();
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const x = doc.data();
                    const isM = userC && x.uid === userC.uid;
                    if(isA || isM || x.visibility === 'public') {
                        grid.innerHTML += `
                            <div class="app-card p-6 border border-gray-50 flex flex-col justify-between hover:scale-[1.03] transition-all relative">
                                ${(isA || isM) ? `<button onclick="deleteExam('${doc.id}')" class="absolute top-4 right-4 text-red-100 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <div>
                                    <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase border ${x.visibility==='public'?'bg-green-100 text-green-600 border-green-200':'bg-gray-100 text-gray-500'}">${x.visibility}</span>
                                    <h3 class="font-black text-xl mt-4 mb-2 dark:text-white line-clamp-2">${x.title}</h3>
                                    <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">โดย: ${x.owner}</p>
                                </div>
                                <button class="w-full py-4 bg-gray-50 border rounded-2xl text-[10px] font-black uppercase text-gray-500 hover:bg-primary hover:text-white transition-all dark:bg-gray-700">Open Exam (${x.questions.length})</button>
                                ${isA ? `<button onclick="toggleVisibility('${doc.id}','${x.visibility}')" class="w-full py-2 mt-2 text-[9px] font-bold text-blue-500 underline uppercase tracking-tighter">สลับสถานะ</button>` : ''}
                            </div>
                        `;
                    }
                });
            } catch (e) { grid.innerHTML = 'Error loading: ' + e.message; }
        }

        async function toggleVisibility(id, cur) { await db.collection('exams').doc(id).update({ visibility: (cur==='public'?'private':'public') }); fetchExams(); }
        async function deleteExam(id) { if(confirm("ลบถาวร?")) { await db.collection('exams').doc(id).delete(); fetchExams(); } }

        // 5. UI & Themes
        function toggleSidebar() { document.getElementById('sideSettings').classList.toggle('translate-x-full'); }
        function updateTheme(t) {
            document.body.classList.remove('theme-blue', 'theme-dark');
            if(t !== 'green') document.body.classList.add('theme-' + t);
            localStorage.setItem('mk_final_theme', t);
        }
        function switchPage(target) {
            ['db','import','ai','chat'].forEach(x => {
                document.getElementById('view-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active');
            });
            document.getElementById('view-'+target).classList.remove('hidden');
            document.getElementById('btn-'+target).classList.add('active');
            document.getElementById('view-editor').classList.add('hidden');
            if(target==='db') fetchExams();
        }

        function saveAdminSettings() {
            if(!isA) return;
            localStorage.setItem('mk_final_v5_key', document.getElementById('adm-key').value);
            localStorage.setItem('mk_final_v5_name', document.getElementById('adm-name').value);
            localStorage.setItem('mk_final_v5_img', document.getElementById('adm-img').value);
            localStorage.setItem('mk_final_v5_persona', document.getElementById('adm-persona').value);
            loadAI(); alert("Admin Mark: บันทึกข้อมูลสำเร็จ!");
        }

        function loadAI() {
            const n = localStorage.getItem('mk_final_v5_name') || "AI Tutor Pro";
            const i = localStorage.getItem('mk_final_v5_img') || "https://ui-avatars.com/api/?name=AI&background=22c55e&color=fff";
            document.getElementById('ai-name-gen').innerText = n;
            document.getElementById('ai-name-chat').innerText = n;
            document.getElementById('ai-img-gen').src = i;
            document.getElementById('ai-img-chat').src = i;
            
            document.getElementById('adm-name').value = n;
            document.getElementById('adm-img').value = i;
            document.getElementById('adm-key').value = getAiKey();
            document.getElementById('adm-persona').value = localStorage.getItem('mk_final_v5_persona') || "";
        }

        window.onload = function() {
            if(localStorage.getItem('mk_final_theme')) updateTheme(localStorage.getItem('mk_final_theme'));
            loadAI(); switchPage('db');
        };
    </script>
</body>
</html>
