<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฝึกประวัติศาสตร์ 20 ข้อ</title>
<style>
body{font-family:sans-serif;background:#eef2ff;padding:20px;}
.container{background:white;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{color:#3f51b5;}
button{padding:10px;margin-top:20px;background:#3f51b5;color:white;border:none;border-radius:6px;}
.correct{color:green;}
.wrong{color:red;}
</style>
</head>

<body>
<div class="container">
<h2>แบบฝึกทำข้อสอบอารยธรรมโลก (20 ข้อ)</h2>

<form id="quiz">

<div id="questions"></div>

<button type="button" onclick="check()">ส่งคำตอบ</button>
<h3 id="result"></h3>

</form>
</div>

<script>

const q = [
["ความเจริญทางวิทยาศาสตร์เกิดขึ้นในอารยธรรมใด",
["จีน","อินเดีย","เมโสโปเตเมีย","อียิปต์"],2],

["กำแพงเมืองจีนสร้างขึ้นเพื่ออะไร",
["ค้าขาย","ป้องกันการรุกราน","ศาสนา","ขยายเมือง"],1],

["แม่น้ำสำคัญของอารยธรรมเมโสโปเตเมีย",
["แม่น้ำไนล์","แม่น้ำคงคา","ไทกริส-ยูเฟรติส","แม่น้ำฮวงโห"],2],

["แนวคิดของลัทธิเต๋าเน้นอะไร",
["สงคราม","กฎหมาย","เรียบง่ายและสมดุล","การค้า"],2],

["ผู้ค้นพบทฤษฎีวิวัฒนาการ",
["นิวตัน","ไอน์สไตน์","ชาร์ลส์ ดาร์วิน","อริสโตเติล"],2],

["ชนชาติใดเข้ามามีอิทธิพลในอินเดีย",
["จีน","อังกฤษ","ญี่ปุ่น","อาหรับ"],1],

["ชนชาติผู้สร้างอารยธรรมเมโสโปเตเมีย",
["สุเมเรียน","อียิปต์","โรมัน","กรีก"],0],

["จุดเด่นของอารยธรรมจีน",
["พีระมิด","ตัวอักษรจีน","โคลอสเซียม","ปฏิทินสุริยะ"],1],

["เมืองในอารยธรรมสินธุมีความเจริญด้านใด",
["กองทัพ","วางผังเมืองและระบบระบายน้ำ","ศาสนา","กีฬา"],1],

["รามเกียรติ์เป็นวรรณคดีของประเทศใด",
["จีน","อินเดีย","ไทย","ญี่ปุ่น"],2],

["ศาสนาใดมีอิทธิพลต่ออารยธรรมจีน",
["พุทธ","เต๋า","คริสต์","อิสลาม"],1],

["ระบบวรรณะเกี่ยวข้องกับอารยธรรมใด",
["จีน","อินเดีย","กรีก","โรมัน"],1],

["ระบบสังคมแบบแบ่งชนชั้นในอินเดียเรียกว่าอะไร",
["ประชาธิปไตย","วรรณะ","จักรวรรดิ","สาธารณรัฐ"],1],

["หน่วยงานที่รับรองมรดกโลก",
["UNESCO","WHO","NASA","UNICEF"],0],

["ความเชื่อว่าสิ่งต่างๆมีวิญญาณเรียกว่าอะไร",
["เทวนิยม","วิญญาณนิยม","เอกเทวนิยม","พหุเทวนิยม"],1],

["ความเชื่อเกี่ยวกับธรรมชาติของมนุษย์",
["ศาสนา","ธรรมชาติ","การเมือง","เศรษฐกิจ"],1],

["ดินแดนอารยธรรมมักเกิดบริเวณใด",
["ภูเขา","ทะเลทราย","ลุ่มแม่น้ำ","ที่ราบสูง"],2],

["ลักษณะภูมิประเทศของจีน",
["ทะเลทราย","ภูเขาสูง","ที่ราบลุ่มแม่น้ำ","ป่าดิบ"],2],

["1 ใน 7 สิ่งมหัศจรรย์ของโลก",
["โคลอสเซียม","กำแพงเมืองจีน","หอไอเฟล","บิ๊กเบน"],1],

["ศาสนาพุทธเจริญรุ่งเรืองในสมัยใดของจีน",
["ราชวงศ์ฮั่น","ราชวงศ์ถัง","ราชวงศ์หมิง","ราชวงศ์ชิง"],1]
];

const letters=["ก","ข","ค","ง"];

for(let i=0;i<q.length;i++){
document.getElementById("questions").innerHTML+=`<p>${i+1}. ${q[i][0]}</p>`;
for(let j=0;j<4;j++){
document.getElementById("questions").innerHTML+=
`<input type="radio" name="q${i}" value="${j}"> ${letters[j]}. ${q[i][1][j]}<br>`;
}
}

function check(){
let score=0;
for(let i=0;i<q.length;i++){
let ans=document.querySelector(`input[name="q${i}"]:checked`);
if(ans && ans.value==q[i][2]) score++;
}
document.getElementById("result").innerHTML="ได้ "+score+" / 20 คะแนน";
}

</script>

</body>
</html>
